<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GoldJournal Pro Max Lite</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [trades, setTrades] = useState([]);
            const [showAdd, setShowAdd] = useState(false);
            const [form, setForm] = useState({ pnl: '', rr: '', side: 'BUY', session: 'NY', note: '', emo: '😌' });

            useEffect(() => {
                const saved = localStorage.getItem('gold_final_v3');
                if (saved) setTrades(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('gold_final_v3', JSON.stringify(trades));
            }, [trades]);

            const stats = useMemo(() => {
                const total = trades.reduce((s, t) => s + Number(t.pnl || 0), 0);
                const wins = trades.filter(t => Number(t.pnl) > 0).length;
                const wr = trades.length > 0 ? (wins / trades.length * 100).toFixed(0) : 0;
                return { total, wr, count: trades.length };
            }, [trades]);

            const save = () => {
                if (!form.pnl) return;
                setTrades([{ ...form, id: Date.now(), date: new Date().toLocaleDateString() }, ...trades]);
                setShowAdd(false);
                setForm({ pnl: '', rr: '', side: 'BUY', session: 'NY', note: '', emo: '😌' });
            };

            return (
                <div className="min-h-screen pb-24 p-4 max-w-md mx-auto">
                    <header className="flex justify-between items-end mb-6">
                        <div>
                            <h1 className="text-2xl font-black text-yellow-500 italic">GOLD JOURNAL</h1>
                            <p className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Performance Tracking</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-slate-400 font-bold uppercase">Net PnL</p>
                            <p className={`text-xl font-black ${stats.total >= 0 ? 'text-green-400' : 'text-red-400'}`}>${stats.total}</p>
                        </div>
                    </header>

                    {/* Simple Stats Card */}
                    <div className="bg-slate-900 p-5 rounded-[2rem] border border-slate-800 mb-6 shadow-xl">
                        <div className="flex justify-between items-center mb-4">
                            <span className="text-xs font-bold text-slate-400 uppercase">Win Rate: {stats.wr}%</span>
                            <span className="text-xs font-bold text-slate-400 uppercase">Total: {stats.count}</span>
                        </div>
                        <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden flex">
                            <div style={{ width: `${stats.wr}%` }} className="h-full bg-yellow-500 transition-all duration-500"></div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {trades.map(t => (
                            <div key={t.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 border-l-4 border-l-yellow-500">
                                <div className="flex justify-between items-start mb-1">
                                    <div className="flex items-center gap-2">
                                        <span className={`text-[9px] font-black px-2 py-0.5 rounded ${t.side === 'BUY' ? 'bg-blue-600' : 'bg-red-600'}`}>{t.side}</span>
                                        <span className="text-[9px] font-bold text-slate-500 bg-slate-800 px-2 py-0.5 rounded uppercase">{t.session}</span>
                                        <span className="text-[9px] text-slate-500">{t.date}</span>
                                    </div>
                                    <p className={`font-black ${Number(t.pnl) >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                        {Number(t.pnl) >= 0 ? '+' : ''}${t.pnl}
                                    </p>
                                </div>
                                <p className="text-sm font-bold">XAUUSD {t.emo} <span className="text-[10px] text-slate-500 ml-2 font-normal italic">RR: {t.rr || '0'}</span></p>
                                {t.note && <p className="mt-2 text-[11px] text-slate-400 italic bg-black/20 p-2 rounded-lg leading-relaxed">"{t.note}"</p>}
                            </div>
                        ))}
                    </div>

                    <button onClick={() => setShowAdd(true)} className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-yellow-500 text-black px-10 py-4 rounded-full font-black text-lg shadow-2xl active:scale-95 transition-transform">ADD TRADE +</button>

                    {showAdd && (
                        <div className="fixed inset-0 bg-black/95 flex items-end p-4 z-50">
                            <div className="bg-slate-900 w-full p-6 rounded-[2.5rem] border border-slate-800 max-w-md mx-auto">
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => setForm({...form, side:'BUY'})} className={`flex-1 p-3 rounded-xl font-bold ${form.side === 'BUY' ? 'bg-blue-600' : 'bg-slate-800 text-slate-500'}`}>BUY</button>
                                    <button onClick={() => setForm({...form, side:'SELL'})} className={`flex-1 p-3 rounded-xl font-bold ${form.side === 'SELL' ? 'bg-red-600' : 'bg-slate-800 text-slate-500'}`}>SELL</button>
                                </div>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <input type="number" placeholder="PnL ($)" value={form.pnl} onChange={e => setForm({...form, pnl:e.target.value})} className="p-4 bg-slate-800 rounded-2xl font-bold outline-none border border-slate-700 focus:border-yellow-500" />
                                    <input type="number" placeholder="R:R Ratio" value={form.rr} onChange={e => setForm({...form, rr:e.target.value})} className="p-4 bg-slate-800 rounded-2xl font-bold outline-none border border-slate-700 focus:border-yellow-500" />
                                </div>
                                <div className="flex gap-2 mb-4">
                                    {['ASIA', 'LON', 'NY'].map(s => (
                                        <button key={s} onClick={() => setForm({...form, session:s})} className={`flex-1 p-2 rounded-xl text-[10px] font-bold border ${form.session === s ? 'bg-yellow-500 text-black' : 'border-slate-700 text-slate-500'}`}>{s}</button>
                                    ))}
                                </div>
                                <textarea placeholder="Note (เหตุผลที่เข้าเทรด)" value={form.note} onChange={e => setForm({...form, note:e.target.value})} className="w-full p-4 bg-slate-800 rounded-2xl mb-4 text-sm h-20 outline-none border border-slate-700 focus:border-yellow-500" />
                                <div className="flex justify-around mb-6 text-2xl">
                                    {['😌', '😐', '😰', '😤'].map(e => (
                                        <button key={e} onClick={() => setForm({...form, emo:e})} className={form.emo === e ? 'scale-150 transition-transform' : 'opacity-30'}>{e}</button>
                                    ))}
                                </div>
                                <button onClick={save} className="w-full bg-yellow-500 text-black p-4 rounded-2xl font-black text-xl mb-3 shadow-lg shadow-yellow-500/20">SAVE 📀</button>
                                <button onClick={() => setShowAdd(false)} className="w-full text-slate-500 font-bold py-2">CANCEL</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
