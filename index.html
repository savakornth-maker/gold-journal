<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GoldJournal"/>
<meta name="theme-color" content="#0d0c0a"/>
<title>GoldJournal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-size:13px}
body{font-family:-apple-system,sans-serif;background:#0d0c0a;color:#f0e6c8;max-width:430px;margin:0 auto}
button,input,textarea{font-family:inherit;font-size:13px}
button{cursor:pointer;-webkit-appearance:none}
input,textarea{-webkit-appearance:none;outline:none}
::-webkit-scrollbar{display:none}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#hdr{flex-shrink:0;padding:env(safe-area-inset-top,44px) 12px 0}
#cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#141210;border-top:1px solid #2a2520;display:flex;padding:6px 0 env(safe-area-inset-bottom,18px);z-index:100}
.card{background:#161310;border-radius:10px;padding:9px 11px;border:1px solid #2a2520;margin-bottom:8px}
.fi{width:100%;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:8px 10px;color:#f0e6c8;font-size:13px}
.fi:focus{border-color:#f6c90e88}
textarea.fi{resize:none}
.chip{display:inline-block;flex-shrink:0;padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #2a2520;background:#181411;color:#8a7a5a}
.tc{margin:0 12px 6px;background:#161310;border-radius:12px;border:1px solid #2a2520;overflow:hidden}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:flex-end}
.sh{background:#141210;border-radius:18px 18px 0 0;width:100%;max-height:93vh;overflow-y:auto;padding:14px 14px 44px}
.hndl{width:36px;height:3px;background:#2a2520;border-radius:2px;margin:0 auto 12px}
.bg{width:100%;background:linear-gradient(135deg,#f6c90e,#d4a000);border:none;border-radius:11px;padding:13px;color:#000;font-weight:800;font-size:15px;cursor:pointer}
.bs{border:none;border-radius:6px;padding:4px 7px;cursor:pointer;font-size:12px}
#fab{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom,0px));right:14px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#f6c90e,#d4a000);border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(246,201,14,.5);z-index:50;cursor:pointer;color:#000}
#toast{position:fixed;top:calc(58px + env(safe-area-inset-top,0px));left:50%;transform:translateX(-50%);border-radius:8px;padding:8px 16px;z-index:300;font-size:12px;font-weight:600;white-space:nowrap;pointer-events:none;display:none}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:none;align-items:center;justify-content:center;padding:12px;flex-direction:column;gap:10px}
#lb img{max-width:100%;max-height:80vh;border-radius:10px}
.wbox{position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#3d1a1a;border:1.5px solid #fc8181;border-radius:12px;padding:14px 18px;z-index:250;max-width:280px;display:none}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cday{border-radius:6px;padding:3px 1px;text-align:center;min-height:44px;border:1px solid #2a2520;cursor:pointer}
.ptab{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #2a2520;background:#181411;color:#8a7a5a}
.ptab.act{border-color:#f6c90e;background:#3d301022;color:#f6c90e}
</style>
</head>
<body>
<div id="app">
  <div id="hdr"></div>
  <div id="cnt"></div>
  <nav id="nav"></nav>
</div>
<div id="lb" onclick="closeLB()">
  <img id="lbimg" src=""/>
  <div id="lbcap" style="color:#8a7a5a;font-size:12px"></div>
  <button onclick="event.stopPropagation();closeLB()" style="position:fixed;top:20px;right:20px;background:none;border:none;color:#fff;font-size:26px">x</button>
</div>
<div id="toast"></div>
<div id="rwarn" class="wbox">
  <div style="color:#fc8181;font-weight:800;font-size:14px;margin-bottom:5px">Risk Warning</div>
  <div id="rmsg" style="color:#f0e6c8;font-size:12px;line-height:1.5"></div>
  <button onclick="document.getElementById('rwarn').style.display='none'" style="margin-top:10px;width:100%;background:#fc8181;border:none;border-radius:7px;padding:8px;color:#fff;font-weight:700">OK</button>
</div>
<script>
var EMO=[{key:"calm",lbl:"สงบ",em:"😌",col:"#3ecf8e"},{key:"neutral",lbl:"ปกติ",em:"😐",col:"#a0aec0"},{key:"fear",lbl:"กลัว",em:"😰",col:"#667eea"},{key:"greed",lbl:"โลภ",em:"🤑",col:"#f6ad55"},{key:"fomo",lbl:"FOMO",em:"😤",col:"#fc8181"}];
var TF=["M1","M5","M15","M30","H1","H4","D1","W1"];
var SES=["Asian","London","New York","Overlap"];

function uid(){return Math.random().toString(36).slice(2,10)}
function td(){return new Date().toISOString().slice(0,10)}
function f2(n,d){if(n==null||isNaN(n))return"—";return Number(n).toFixed(d==null?2:d)}
function fm(n){if(n==null||isNaN(n))return"—";return(n>=0?"+":"")+f2(n)}
function rr(e,sl,tp){if(!e||!sl||!tp)return null;var r=Math.abs(e-sl),w=Math.abs(tp-e);return r===0?null:w/r}
function pnl(e,sl,tp,lot,dir,res){if(res==="Open")return null;var cl=res==="Win"?tp:sl;return(dir==="BUY"?cl-e:e-cl)*(lot||0)*100}

function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function lsGet(k){try{var d=localStorage.getItem(k);return d?JSON.parse(d):null}catch(e){return null}}

function getSample(){return[
  {id:uid(),date:"2025-03-01",dir:"BUY",entry:2850,sl:2830,tp:2900,lot:0.5,result:"Win",tf:"H4",ses:"London",note:"เข้าที่ breakout zone",emo:"calm",imgBefore:null,imgAfter:null},
  {id:uid(),date:"2025-03-05",dir:"SELL",entry:2920,sl:2940,tp:2870,lot:0.3,result:"Loss",tf:"H1",ses:"New York",note:"News spike",emo:"fear",imgBefore:null,imgAfter:null},
  {id:uid(),date:"2025-03-10",dir:"BUY",entry:2880,sl:2860,tp:2940,lot:0.2,result:"Win",tf:"D1",ses:"Asian",note:"",emo:"neutral",imgBefore:null,imgAfter:null},
  {id:uid(),date:"2025-04-02",dir:"SELL",entry:2980,sl:3000,tp:2930,lot:0.3,result:"Win",tf:"H1",ses:"London",note:"",emo:"calm",imgBefore:null,imgAfter:null},
  {id:uid(),date:"2025-04-08",dir:"BUY",entry:2945,sl:2925,tp:3010,lot:0.5,result:"Loss",tf:"H4",ses:"New York",note:"",emo:"fomo",imgBefore:null,imgAfter:null},
  {id:uid(),date:"2025-04-15",dir:"BUY",entry:2910,sl:2895,tp:2960,lot:0.4,result:"Open",tf:"H4",ses:"London",note:"รอดู",emo:"greed",imgBefore:null,imgAfter:null}
]}

var savedT = lsGet("gj5") || getSample();
var savedS = lsGet("gj5s") || {goal:500,bal:10000,mrisk:2,dark:true};
var G = {
  tab:"journal", t:savedT,
  search:"", sk:"date", sd:"desc",
  chips:[],
  jperiod:"all", jFrom:"", jTo:"",
  dperiod:"all", dFrom:"", dTo:"",
  cdate:new Date(), csel:null,
  etrade:null,
  goal:savedS.goal, bal:savedS.bal, mrisk:savedS.mrisk, dark:savedS.dark
};

function svt(){lsSet("gj5",G.t)}
function svs(){lsSet("gj5s",{goal:G.goal,bal:G.bal,mrisk:G.mrisk,dark:G.dark})}

function getPeriodRange(period,fk,tk){
  if(period==="all") return null;
  if(period==="custom") return {from:G[fk]||"",to:G[tk]||""};
  var now=new Date(), from="", to=td();
  if(period==="day"){ from=td(); }
  return {from:from,to:to};
}
function filterPeriod(list,period,fk,tk){
  var r=getPeriodRange(period,fk,tk);
  if(!r) return list;
  return list.filter(function(t){return(!r.from||t.date>=r.from)&&(!r.to||t.date<=r.to)});
}

function calcStats(trades){
  var cl=trades.filter(function(x){return x.result!=="Open"});
  var w=cl.filter(function(x){return x.result==="Win"});
  var l=cl.filter(function(x){return x.result==="Loss"});
  var tot=cl.reduce(function(s,x){return s+(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
  var wp=w.reduce(function(s,x){return s+(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
  var la=Math.abs(l.reduce(function(s,x){return s+(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0));
  var wr=cl.length?w.length/cl.length*100:0;
  var aw=w.length?wp/w.length:0, al=l.length?la/l.length:0;
  var pf=la>0?wp/la:w.length>0?Infinity:0;
  var exp=cl.length?(wr/100*aw-(1-wr/100)*al):0;
  var rrs=cl.filter(function(x){return rr(x.entry,x.sl,x.tp)}).map(function(x){return rr(x.entry,x.sl,x.tp)});
  var arr=rrs.length?rrs.reduce(function(s,v){return s+v},0)/rrs.length:0;
  var sorted=cl.slice().sort(function(a,b){return a.date<b.date?-1:1});
  var tw=0,tl=0,mw=0,ml=0;
  sorted.forEach(function(x){if(x.result==="Win"){tw++;tl=0;if(tw>mw)mw=tw}else{tl++;tw=0;if(tl>ml)ml=tl}});
  var cur=sorted.length?(sorted[sorted.length-1].result==="Win"?tw:-tl):0;
  var pk=0,dd=0,c2=0;
  sorted.forEach(function(x){c2+=(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0);if(c2>pk)pk=c2;if(pk-c2>dd)dd=pk-c2});
  var stMap={};
  cl.forEach(function(x){if(!x.strat)return;if(!stMap[x.strat])stMap[x.strat]={p:0,n:0};stMap[x.strat].p+=(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0);stMap[x.strat].n++});
  var bestStrat=null,bestPnl=-Infinity;
  Object.keys(stMap).forEach(function(k){if(stMap[k].p>bestPnl){bestPnl=stMap[k].p;bestStrat=k}});
  return{w:w.length,l:l.length,op:trades.filter(function(x){return x.result==="Open"}).length,tot:tot,wr:wr,pf:pf,aw:aw,al:al,exp:exp,arr:arr,cur:cur,mw:mw,ml:ml,dd:dd,bestStrat:bestStrat,bestPnl:bestPnl,stMap:stMap};
}

function curMoPnL(){
  var k=new Date().toISOString().slice(0,7);
  return G.t.filter(function(x){return x.result!=="Open"&&x.date.indexOf(k)===0}).reduce(function(s,x){return s+(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
}

function getFiltered(){
  var list=filterPeriod(G.t.slice(),G.jperiod,"jFrom","jTo");
  if(G.search){var q=G.search.toLowerCase();list=list.filter(function(x){return(x.note||"").toLowerCase().indexOf(q)>=0||(x.ses||"").toLowerCase().indexOf(q)>=0||(x.tf||"").toLowerCase().indexOf(q)>=0})}
  if(G.chips.indexOf("BUY")>=0)list=list.filter(function(x){return x.dir==="BUY"});
  else if(G.chips.indexOf("SELL")>=0)list=list.filter(function(x){return x.dir==="SELL"});
  if(G.chips.indexOf("Win")>=0)list=list.filter(function(x){return x.result==="Win"});
  else if(G.chips.indexOf("Loss")>=0)list=list.filter(function(x){return x.result==="Loss"});
  else if(G.chips.indexOf("Open")>=0)list=list.filter(function(x){return x.result==="Open"});
  list.sort(function(a,b){
    var va=a[G.sk],vb=b[G.sk];
    if(G.sk==="rr"){va=rr(a.entry,a.sl,a.tp);vb=rr(b.entry,b.sl,b.tp)}
    if(G.sk==="pnl"){va=pnl(a.entry,a.sl,a.tp,a.lot,a.dir,a.result);vb=pnl(b.entry,b.sl,b.tp,b.lot,b.dir,b.result)}
    if(va==null)return 1;if(vb==null)return -1;
    return G.sd==="asc"?(va>vb?1:-1):(va<vb?1:-1);
  });
  return list;
}

var tt;
function toast(msg,type){
  var el=document.getElementById("toast");
  el.textContent=msg;
  el.style.cssText="display:block;opacity:1;background:"+(type==="err"?"#3d1a1a":type==="ok"?"#1a3d2e":"#2a1e00")+";border:1px solid "+(type==="err"?"#fc8181":type==="ok"?"#3ecf8e":"#f6c90e")+";color:#f0e6c8";
  clearTimeout(tt);tt=setTimeout(function(){el.style.opacity="0";setTimeout(function(){el.style.display="none"},300)},2400);
}
function openLB(b64,cap){document.getElementById("lbimg").src="data:image/jpeg;base64,"+b64;document.getElementById("lbcap").textContent=cap||"";document.getElementById("lb").style.display="flex"}
function closeLB(){document.getElementById("lb").style.display="none"}

function svgLine(trades){
  var s=trades.filter(function(x){return x.result!=="Open"}).sort(function(a,b){return a.date<b.date?-1:1});
  if(!s.length)return'<div style="color:#8a7a5a;text-align:center;padding:12px;font-size:11px">ยังไม่มีข้อมูล</div>';
  var c=0,pts=[0];s.forEach(function(x){c+=(pnl(x.entry,x.sl,x.tp,x.lot,x.dir,x.result)||0);pts.push(c)});
  var W=280,H=80,mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1;
  var sx=function(i){return(i/(pts.length-1))*(W-16)+8};
  var sy=function(v){return H-6-((v-mn)/rng)*(H-14)};
  var path=pts.map(function(p,i){return(i===0?"M":"L")+sx(i).toFixed(1)+","+sy(p).toFixed(1)}).join(" ");
  var fill=path+" L"+sx(pts.length-1).toFixed(1)+","+H+" L"+sx(0).toFixed(1)+","+H+" Z";
  var ip=pts[pts.length-1]>=0,col=ip?"#3ecf8e":"#fc8181";
  return'<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".4"/><stop offset="100%" stop-color="'+col+'" stop-opacity=".03"/></linearGradient></defs><line x1="8" y1="'+sy(0).toFixed(1)+'" x2="'+(W-8)+'" y2="'+sy(0).toFixed(1)+'" stroke="#332820" stroke-width="1" stroke-dasharray="3,3"/><path d="'+fill+'" fill="url(#g1)"/><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/><circle cx="'+sx(pts.length-1).toFixed(1)+'" cy="'+sy(pts[pts.length-1]).toFixed(1)+'" r="3.5" fill="'+col+'"/></svg>';
}
function svgBar(data){
  if(!data.length)return'<div style="color:#8a7a5a;text-align:center;padding:10px;font-size:11px">ไม่มีข้อมูล</div>';
  var mx=Math.max.apply(null,data.map(function(d){return Math.abs(d.v)}));if(!mx)mx=1;
  return'<div style="display:flex;align-items:flex-end;gap:4px;height:76px;padding:0 2px">'+data.map(function(d){
    var h=Math.max(3,(Math.abs(d.v)/mx)*62),pos=d.v>=0;
    return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:7px;color:'+(pos?"#3ecf8e":"#fc8181")+';font-weight:600">'+(d.v>0?"+":"")+f2(d.v,0)+'</div><div style="width:100%;height:'+h+'px;background:'+(pos?"linear-gradient(180deg,#3ecf8e,#2a9e6e)":"linear-gradient(180deg,#fc8181,#e05555)")+';border-radius:3px 3px 0 0"></div><div style="font-size:8px;color:#8a7a5a;text-align:center;max-width:32px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.l+'</div></div>';
  }).join("")+'</div>';
}
function svgDonut(w,l,o){
  var tot=w+l+o||1;var segs=[{v:w,c:"#3ecf8e"},{v:l,c:"#fc8181"},{v:o,c:"#f6c90e"}];
  var R=44,cx=54,cy=54,sw=14,ci=2*Math.PI*R;var cum=0;
  return'<svg width="108" height="108" viewBox="0 0 108 108">'+segs.map(function(s){var p=s.v/tot,d=p*ci,off=-cum*ci;cum+=p;return'<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+d+' '+(ci-d)+'" stroke-dashoffset="'+(off+ci*0.25)+'"/>'}).join("")+'<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="#f0e6c8" font-size="16" font-weight="700">'+w+'</text><text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="#8a7a5a" font-size="8">wins</text></svg>';
}

function ptabs(cur,tag,fk,tk){
  var fv=G[fk]||"",tv=G[tk]||"",html='<div style="padding:4px 12px 2px"><div style="display:flex;gap:5px;margin-bottom:4px">';
  [{k:"day",l:"วันนี้"},{k:"custom",l:"ช่วงวัน"},{k:"all",l:"ทั้งหมด"}].forEach(function(p){
    html+='<button class="ptab'+(cur===p.k?" act":"")+'" onclick="setP(\''+tag+'\',\''+p.k+'\')">'+p.l+'</button>';
  });
  html+='</div>';
  if(cur==="custom"){
    html+='<div style="display:flex;gap:5px;align-items:center;margin-bottom:4px">';
    html+='<input type="date" value="'+fv+'" onchange="G.'+fk+'=this.value;setP(\''+tag+'\',\'custom\')" style="flex:1;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;color:'+(fv?"#f0e6c8":"#8a7a5a")+';font-size:10px;outline:none"/>';
    html+='<span style="color:#8a7a5a;font-size:10px">-</span>';
    html+='<input type="date" value="'+tv+'" onchange="G.'+tk+'=this.value;setP(\''+tag+'\',\'custom\')" style="flex:1;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;color:'+(tv?"#f0e6c8":"#8a7a5a")+';font-size:10px;outline:none"/>';
    html+='</div>';
  }
  html+='</div>';
  return html;
}
function setP(tag,p){if(tag==="j"){G.jperiod=p;rJ()}else{G.dperiod=p;rD()}}

function rHdr(){
  document.getElementById("hdr").innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:6px"><div><div style="color:#f6c90e;font-size:17px;font-weight:800">GoldJournal</div><div style="color:#8a7a5a;font-size:9px">XAU/USD Trading Journal</div></div><div style="display:flex;gap:5px;align-items:center"><button onclick="toggleDark()" style="background:#161310;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;font-size:13px">'+(G.dark?"☀️":"🌙")+'</button><button onclick="openSett()" style="background:#161310;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;font-size:13px">⚙️</button></div></div>';
}

function rNav(){
  document.getElementById("nav").innerHTML=[{k:"journal",i:"📋",l:"Journal"},{k:"dashboard",i:"📊",l:"Stats"},{k:"calendar",i:"📅",l:"Calendar"}].map(function(t){
    return'<button onclick="setTab(\''+t.k+'\')" style="flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;padding:3px 0"><span style="font-size:17px">'+t.i+'</span><span style="color:'+(G.tab===t.k?"#f6c90e":"#8a7a5a")+';font-size:8px;font-weight:'+(G.tab===t.k?700:400)+'">'+t.l+'</span>'+(G.tab===t.k?'<div style="width:16px;height:2px;background:#f6c90e;border-radius:1px;margin-top:1px"></div>':'')+'</button>';
  }).join("");
}

function rJ(){
  var fl=getFiltered();
  var groups={},order=[];
  fl.forEach(function(t){if(!groups[t.date]){groups[t.date]=[];order.push(t.date)}groups[t.date].push(t)});
  order.sort(function(a,b){return G.sd==="asc"?a>b?1:-1:a<b?1:-1});
  var allAct=G.chips.length===0;
  var cbar='<button class="chip" onclick="G.chips=[];rJ()" style="'+(allAct?"border-color:#3ecf8e;color:#3ecf8e;background:#3ecf8e22":"")+'">ทั้งหมด</button> '+
    ["BUY","SELL","Win","Loss","Open"].map(function(c){
      var ac=G.chips.indexOf(c)>=0;
      var col=c==="BUY"?"#3ecf8e":c==="SELL"?"#fc8181":c==="Win"?"#3ecf8e":c==="Loss"?"#fc8181":"#f6c90e";
      return'<button class="chip" onclick="tChip(\''+c+'\')" style="'+(ac?"border-color:"+col+";color:"+col+";background:"+col+"22":"")+'">' +c+'</button>';
    }).join(" ");
  var cards=order.map(function(date){
    var ts=groups[date];
    var dp=ts.reduce(function(s,t){return s+(pnl(t.entry,t.sl,t.tp,t.lot,t.dir,t.result)||0)},0);

  h+='<div style="display:flex;gap:6px;margin-bottom:10px">';
  h+='<div style="flex:1;background:#1c1814;border-radius:8px;padding:7px 3px;text-align:center"><div style="color:#8a7a5a;font-size:9px">R:R</div><div id="prv_rr" style="color:'+rc+';font-size:14px;font-weight:700">'+(rv?"1:"+f2(rv):"—")+'</div></div>';
  h+='<div style="flex:1;background:#1c1814;border-radius:8px;padding:7px 3px;text-align:center"><div style="color:#8a7a5a;font-size:9px">PnL</div><div id="prv_pnl" style="color:'+pc+';font-size:14px;font-weight:700">'+(pv!=null?"$"+fm(pv):"—")+'</div></div>';
  h+='<div style="flex:1;background:#1c1814;border-radius:8px;padding:7px 3px;text-align:center"><div style="color:#8a7a5a;font-size:9px">Risk%</div><div id="prv_risk" style="color:'+(ro?"#fc8181":"#3ecf8e")+';font-size:14px;font-weight:700">'+(rp!=null?f2(rp)+"%":"—")+'</div></div>';
  h+='</div>';
  if(ro)h+='<div style="background:#3d1a1a;border:1px solid #fc818140;border-radius:7px;padding:6px 9px;margin-bottom:8px;color:#fc8181;font-size:11px">Risk '+f2(rp)+'% เกิน '+G.mrisk+'%</div>';
  [{k:"date",l:"📅 วันที่",t:"date"},{k:"entry",l:"Entry",t:"number"},{k:"sl",l:"Stop Loss",t:"number"},{k:"tp",l:"Take Profit",t:"number"},{k:"lot",l:"Lot Size",t:"number"}].forEach(function(x){
    h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:2px">'+x.l+'</label><input type="'+x.t+'" class="fi" value="'+(f[x.k]||"")+'" oninput="FS.'+x.k+'=this.value;upPrev()"/></div>';
  });
  h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Direction</label><div style="display:flex;gap:6px">';
  ["BUY","SELL"].forEach(function(d){h+='<button onclick="FS.dir=\''+d+'\';rForm()" style="flex:1;padding:8px;border-radius:8px;border:2px solid '+(f.dir===d?(d==="BUY"?"#3ecf8e":"#fc8181"):"#2a2520")+';background:'+(f.dir===d?(d==="BUY"?"#1a3d2e":"#3d1a1a"):"#1c1814")+';color:'+(f.dir===d?(d==="BUY"?"#3ecf8e":"#fc8181"):"#8a7a5a")+';font-weight:800;cursor:pointer">'+d+'</button>'});
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Result</label><div style="display:flex;gap:5px">';
  ["Win","Loss","Open"].forEach(function(r){h+='<button onclick="FS.result=\''+r+'\';rForm()" style="flex:1;padding:8px;border-radius:8px;border:2px solid '+(f.result===r?(r==="Win"?"#3ecf8e":r==="Loss"?"#fc8181":"#f6c90e"):"#2a2520")+';background:'+(f.result===r?(r==="Win"?"#1a3d2e":r==="Loss"?"#3d1a1a":"#3d3010"):"#1c1814")+';color:'+(f.result===r?(r==="Win"?"#3ecf8e":r==="Loss"?"#fc8181":"#f6c90e"):"#8a7a5a")+';font-weight:700;cursor:pointer;font-size:11px">'+r+'</button>'});
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Timeframe</label><div style="display:flex;flex-wrap:wrap;gap:4px">';
  TF.forEach(function(t){h+='<button onclick="FS.tf=\''+t+'\';rForm()" style="padding:5px 9px;border-radius:6px;border:1.5px solid '+(f.tf===t?"#f6c90e":"#2a2520")+';background:'+(f.tf===t?"#3d3010":"#1c1814")+';color:'+(f.tf===t?"#f6c90e":"#8a7a5a")+';font-size:11px;cursor:pointer">'+t+'</button>'});
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Session</label><div style="display:flex;flex-wrap:wrap;gap:4px">';
  SES.forEach(function(s){h+='<button onclick="FS.ses=\''+s+'\';rForm()" style="padding:5px 9px;border-radius:6px;border:1.5px solid '+(f.ses===s?"#63b3ed":"#2a2520")+';background:'+(f.ses===s?"#1a2a3d":"#1c1814")+';color:'+(f.ses===s?"#63b3ed":"#8a7a5a")+';font-size:10px;cursor:pointer">'+s+'</button>'});
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Emotion</label><div style="display:flex;gap:4px">';
  EMO.forEach(function(em){h+='<button onclick="FS.emo=\''+em.key+'\';rForm()" style="flex:1;padding:6px 2px;border-radius:7px;border:2px solid '+(f.emo===em.key?em.col:"#2a2520")+';background:'+(f.emo===em.key?em.col+"22":"#1c1814")+';cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px"><span style="font-size:16px">'+em.em+'</span><span style="color:'+(f.emo===em.key?em.col:"#8a7a5a")+';font-size:7px">'+em.lbl+'</span></button>'});
  h+='</div></div>';
  h+='<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><label style="color:#8a7a5a;font-size:10px">Note</label>';
  h+='<div style="display:flex;gap:3px"><button onclick="FS.note=(FS.note||\'\')+\'เหตุผลที่เข้า: \'" style="font-size:8px;padding:2px 5px;border-radius:4px;border:1px solid #2a2520;background:#1c1814;color:#8a7a5a;cursor:pointer">เหตุผลเข้า</button><button onclick="FS.note=(FS.note||\'\')+\'เหตุผลที่ออก: \'" style="font-size:8px;padding:2px 5px;border-radius:4px;border:1px solid #2a2520;background:#1c1814;color:#8a7a5a;cursor:pointer">เหตุผลออก</button><button onclick="FS.note=(FS.note||\'\')+\'บทเรียน: \'" style="font-size:8px;padding:2px 5px;border-radius:4px;border:1px solid #2a2520;background:#1c1814;color:#8a7a5a;cursor:pointer">Lesson</button></div>';
  h+='</div><textarea class="fi" rows="3" oninput="FS.note=this.value">'+((f.note)||"")+'</textarea></div>';
  h+='<div style="margin-bottom:10px"><label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:6px">📸 รูปภาพ</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  ["imgBefore","imgAfter"].forEach(function(key){
    var cap=key==="imgBefore"?"ก่อนเทรด":"หลังเทรด";
    var inp="inp_"+key;
    h+='<div><div style="color:#8a7a5a;font-size:10px;margin-bottom:4px;text-align:center">'+cap+'</div>';
    h+='<div onclick="document.getElementById(\''+inp+'\').click()" style="border:2px dashed #2a2520;border-radius:8px;padding:10px;text-align:center;cursor:pointer;background:#1c1814;min-height:70px;display:flex;align-items:center;justify-content:center">';
    if(f[key]){h+='<div style="position:relative"><img src="data:image/jpeg;base64,'+f[key]+'" style="max-height:60px;border-radius:5px"/><button onclick="event.stopPropagation();FS.'+key+'=null;rForm()" style="position:absolute;top:-4px;right:-4px;background:#fc8181;border:none;border-radius:50%;width:16px;height:16px;color:#fff;font-size:8px;cursor:pointer">x</button></div>'}
    else{h+='<span style="color:#8a7a5a;font-size:11px">+ เพิ่มรูป</span>'}
    h+='<input id="'+inp+'" type="file" accept="image/*" style="display:none" onchange="hdImg(this,\''+key+'\')"/></div></div>';
  });
  h+='</div></div>';
  h+='<button class="bg" onclick="svForm()">'+(G.etrade?"💾 บันทึกการเปลี่ยนแปลง":"✅ บันทึกเทรด")+'</button></div>';
  ov.innerHTML=h;
  document.body.appendChild(ov);
}
function upPrev(){
  var rv=rr(+FS.entry,+FS.sl,+FS.tp);
  var pv=FS.result!=="Open"?pnl(+FS.entry,+FS.sl,+FS.tp,+FS.lot,FS.dir,FS.result):null;
  var rp=G.bal&&FS.entry&&FS.sl?(Math.abs(+FS.entry-+FS.sl)*(+FS.lot||0)*100/G.bal*100):null;
  var e1=document.getElementById("prv_rr"),e2=document.getElementById("prv_pnl"),e3=document.getElementById("prv_risk");
  if(e1){e1.textContent=rv?"1:"+f2(rv):"—";e1.style.color=rv>=2?"#3ecf8e":rv>=1?"#f6c90e":"#fc8181"}
  if(e2){e2.textContent=pv!=null?"$"+fm(pv):"—";e2.style.color=pv>0?"#3ecf8e":pv<0?"#fc8181":"#8a7a5a"}
  if(e3){e3.textContent=rp!=null?f2(rp)+"%":"—";e3.style.color=(rp&&rp>G.mrisk)?"#fc8181":"#3ecf8e"}
}
function hdImg(inp,key){var file=inp.files[0];if(!file||!file.type.match(/^image\//))return;var r=new FileReader();r.onload=function(e){FS[key]=e.target.result.split(",")[1];rForm()};r.readAsDataURL(file)}
function svForm(){
  if(!FS.entry||+FS.entry===0){toast("กรุณากรอก Entry Price","err");return}
  if(!FS.sl||+FS.sl===0){toast("กรุณากรอก Stop Loss","err");return}
  if(!FS.tp||+FS.tp===0){toast("กรุณากรอก Take Profit","err");return}
  var f=Object.assign({},FS,{id:FS.id||uid(),entry:+FS.entry,sl:+FS.sl,tp:+FS.tp,lot:+FS.lot});
  var rp=G.bal&&f.entry&&f.sl?(Math.abs(f.entry-f.sl)*(f.lot||0)*100/G.bal*100):null;
  if(rp&&rp>G.mrisk){document.getElementById("rmsg").textContent="Risk "+f2(rp)+"% เกิน "+G.mrisk+"%";document.getElementById("rwarn").style.display="block"}
  if(G.etrade){G.t=G.t.map(function(x){return x.id===f.id?f:x})}else{G.t=[f].concat(G.t)}
  svt();toast(G.etrade?"แก้ไขแล้ว":"บันทึกแล้ว ✅","ok");closeForm();render();
}
function closeForm(){var el=document.getElementById("fsh");if(el)el.remove()}
function editT(id){openForm(G.t.filter(function(x){return x.id===id})[0])}
function delT(id){G.t=G.t.filter(function(x){return x.id!==id});svt();toast("ลบแล้ว","err");render()}
function dupT(id){var x=G.t.filter(function(t){return t.id===id})[0];if(!x)return;G.t=[Object.assign({},x,{id:uid(),date:td()})].concat(G.t);svt();toast("Duplicate แล้ว","ok");render()}

function openSett(){
  document.getElementById("ssh")&&document.getElementById("ssh").remove();
  var ov=document.createElement("div");ov.className="ov";ov.id="ssh";ov.onclick=function(e){if(e.target===ov)ov.remove()};
  var h='<div class="sh" style="max-height:72vh"><div class="hndl"></div><div style="color:#f0e6c8;font-weight:700;font-size:15px;margin-bottom:12px">⚙️ Settings</div>';
  [{l:"Account Balance ($)",k:"bal",v:G.bal},{l:"Monthly Goal ($)",k:"goal",v:G.goal},{l:"Max Risk % per Trade",k:"mrisk",v:G.mrisk}].forEach(function(x){
    h+='<div style="margin-bottom:10px"><label style="color:#8a7a5a;font-size:11px;display:block;margin-bottom:3px">'+x.l+'</label><input type="number" class="fi" value="'+x.v+'" oninput="G.'+x.k+'=+this.value;svs()"/></div>';
  });
  h+='<div style="display:flex;gap:6px;margin-top:8px"><button onclick="expJSON()" style="flex:1;background:#1a3d2e;border:1px solid #3ecf8e40;border-radius:9px;padding:10px;color:#3ecf8e;font-weight:700;cursor:pointer;font-size:12px">📤 Export</button><label style="flex:1;background:#3d3010;border:1px solid #f6c90e40;border-radius:9px;padding:10px;color:#f6c90e;font-weight:700;cursor:pointer;text-align:center;font-size:12px">📥 Import<input type="file" accept=".json" style="display:none" onchange="impJSON(event)"/></label></div></div>';
  ov.innerHTML=h;document.body.appendChild(ov);
}
function expJSON(){
  var data=JSON.stringify({trades:G.t,settings:{goal:G.goal,bal:G.bal,mrisk:G.mrisk}},null,2);
  if(navigator.share){var file=new File([data],"gold-"+td()+".json",{type:"application/json"});navigator.share({files:[file],title:"GoldJournal Backup"}).then(function(){toast("Export OK","ok")}).catch(function(){showExp(data)})}
  else showExp(data);
}
function showExp(data){
  var old=document.getElementById("expmodal");if(old)old.remove();
  var ov=document.createElement("div");ov.className="ov";ov.id="expmodal";
  ov.innerHTML='<div class="sh"><div class="hndl"></div><div style="color:#f0e6c8;font-size:15px;font-weight:700;margin-bottom:8px">📋 Copy Backup</div><textarea id="expta" rows="8" style="width:100%;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:8px;color:#f0e6c8;font-size:10px;font-family:monospace;resize:none;outline:none" readonly></textarea><button onclick="var t=document.getElementById(\'expta\');t.select();t.setSelectionRange(0,99999);document.execCommand(\'copy\');toast(\'Copied!\',\'ok\')" style="width:100%;margin-top:8px;background:#1a3d2e;border:1px solid #3ecf8e40;border-radius:9px;padding:10px;color:#3ecf8e;font-weight:700;cursor:pointer">📋 Copy</button></div>';
  document.body.appendChild(ov);
  document.getElementById("expta").value=data;
  ov.onclick=function(e){if(e.target===ov)ov.remove()};
}
function impJSON(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(d.trades){G.t=d.trades;svt()}if(d.settings){G.goal=d.settings.goal||500;G.bal=d.settings.bal||10000;G.mrisk=d.settings.mrisk||2;svs()}toast("Import OK","ok");render()}catch(err){toast("Error","err")}};
  r.readAsText(f);e.target.value="";
}

function setTab(t){G.tab=t;render()}
function toggleDark(){G.dark=!G.dark;svs();document.body.style.background=G.dark?"#0d0c0a":"#f5f0e8";rHdr()}
function tChip(c){
  var dg=["BUY","SELL"],rg=["Win","Loss","Open"],ch=G.chips.slice();
  if(dg.indexOf(c)>=0)ch=ch.filter(function(x){return dg.indexOf(x)<0});
  if(rg.indexOf(c)>=0)ch=ch.filter(function(x){return rg.indexOf(x)<0});
  G.chips=ch.indexOf(c)>=0?ch.filter(function(x){return x!==c}):ch.concat([c]);
  rJ();
}
function tSort(k){if(G.sk===k)G.sd=G.sd==="asc"?"desc":"asc";else{G.sk=k;G.sd="desc"}rJ()}
function prevM(){G.cdate=new Date(G.cdate.getFullYear(),G.cdate.getMonth()-1,1);G.csel=null;rC()}
function nextM(){G.cdate=new Date(G.cdate.getFullYear(),G.cdate.getMonth()+1,1);G.csel=null;rC()}
function selCal(d){G.csel=G.csel===d?null:d;rC()}

function render(){
  rHdr();rNav();
  document.getElementById("fab").style.display=G.tab==="journal"?"flex":"none";
  if(G.tab==="journal")rJ();
  else if(G.tab==="dashboard")rD();
  else rC();
}

var fab=document.createElement("button");
fab.id="fab";fab.innerHTML="+";fab.onclick=function(){openForm(null)};fab.style.display="none";
document.getElementById("app").appendChild(fab);

document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden"){svt();svs()}});
window.addEventListener("pagehide",function(){svt();svs()});

render();
</script>
</body>
</html>
