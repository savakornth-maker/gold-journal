<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold App</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">
    <div id="root"></div>
    <script type="text/babel">
        function App() {
            const [trades, setTrades] = React.useState([]);
            const add = () => setTrades([{id:Date.now(), pnl: prompt("กำไรเท่าไหร่ ($)?")}, ...trades]);
            return (
                <div>
                    <h1 className="text-2xl font-bold text-yellow-500 mb-5">GOLD JOURNAL</h1>
                    <button onClick={add} className="bg-yellow-500 text-black p-4 rounded-xl w-full font-bold">บันทึกเทรดใหม่ +</button>
                    <div className="mt-5 space-y-2">
                        {trades.map(t => (
                            <div key={t.id} className="bg-zinc-900 p-4 rounded-xl flex justify-between border-l-4 border-yellow-500">
                                <span>Gold Trade</span>
                                <span className="font-bold text-green-400">${t.pnl}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
