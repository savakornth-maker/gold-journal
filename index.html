<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Firebase Test</title>
</head>
<body style="background:#111;color:#fff;padding:30px;font-family:sans-serif">
<h2>Firebase Auth Test</h2>
<div id="status" style="color:yellow;margin-bottom:20px">Loading...</div>

<input id="email" type="email" placeholder="email" style="display:block;width:100%;padding:10px;margin-bottom:10px;font-size:16px"/><br/>
<input id="pass" type="password" placeholder="password" style="display:block;width:100%;padding:10px;margin-bottom:10px;font-size:16px"/><br/>
<button onclick="doReg()" style="padding:12px 24px;font-size:16px;margin-right:10px;cursor:pointer">สมัคร</button>
<button onclick="doLogin()" style="padding:12px 24px;font-size:16px;cursor:pointer">Login</button>
<div id="result" style="color:#0f0;margin-top:20px;white-space:pre-wrap"></div>
<div id="err" style="color:#f88;margin-top:10px;white-space:pre-wrap"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
document.getElementById('status').textContent = 'Scripts loaded OK';

var config = {
  apiKey: "AIzaSyAdpF6MhHmlkAukNFUJzBL_Zx4Q_u607KU",
  authDomain: "gold-journal-f724e.firebaseapp.com",
  projectId: "gold-journal-f724e"
};

try {
  firebase.initializeApp(config);
  document.getElementById('status').textContent = 'Firebase init OK';
} catch(e) {
  document.getElementById('err').textContent = 'Init error: ' + e.message;
}

var auth = firebase.auth();

auth.onAuthStateChanged(function(u) {
  if(u) {
    document.getElementById('result').textContent = 'Logged in as: ' + u.email;
  } else {
    document.getElementById('result').textContent = 'Not logged in';
  }
});

function doReg() {
  var e = document.getElementById('email').value;
  var p = document.getElementById('pass').value;
  document.getElementById('err').textContent = 'Registering...';
  auth.createUserWithEmailAndPassword(e, p)
    .then(function(r) {
      document.getElementById('err').textContent = '';
      document.getElementById('result').textContent = 'Registered: ' + r.user.email;
    })
    .catch(function(e) {
      document.getElementById('err').textContent = 'Reg Error: ' + e.code + '\n' + e.message;
    });
}

function doLogin() {
  var e = document.getElementById('email').value;
  var p = document.getElementById('pass').value;
  document.getElementById('err').textContent = 'Logging in...';
  auth.signInWithEmailAndPassword(e, p)
    .then(function(r) {
      document.getElementById('err').textContent = '';
      document.getElementById('result').textContent = 'Logged in: ' + r.user.email;
    })
    .catch(function(e) {
      document.getElementById('err').textContent = 'Login Error: ' + e.code + '\n' + e.message;
    });
}
</script>
</body>
</html>
