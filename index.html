// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const uid=()=>Math.random().toString(36).slice(2,10);
const today=()=>new Date().toISOString().slice(0,10);
const fmt=(n,d=2)=>n==null||isNaN(n)?"вҖ”":Number(n).toFixed(d);
const fmtM=n=>n==null||isNaN(n)?"вҖ”":(n>=0?"+":"")+fmt(n,2);
function maxStrk(trades,res){let m=0,c=0;[...trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{t.result===res?(c++,m=Math.max(m,c)):c=0;});return m;}
function noFomoStrk(trades){let c=0,m=0;[...trades].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{t.emotion!=="fomo"?(c++,m=Math.max(m,c)):c=0;});return m;}
function calcRR(e,sl,tp){if(!e||!sl||!tp)return null;const r=Math.abs(e-sl),rw=Math.abs(tp-e);return r===0?null:rw/r;}
function calcPnL(e,cp,sl,tp,lot,dir,res){if(res==="Open")return null;const cl=cp||(res==="Win"?tp:sl);return(dir==="BUY"?cl-e:e-cl)*(lot||0)*100;}

// в”Җв”Җ Storage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadTrades(){try{const d=localStorage.getItem("gj2_trades");return d?JSON.parse(d):getSample();}catch{return getSample();}}

function getSample(){return[

  {id:uid(),date:"2025-03-05",direction:"SELL",entry:2920,sl:2940,tp:2870,lotSize:0.3,result:"Loss",strategy:"Reversal",  timeframe:"H1",session:"New York",note:"News spike аё—аёі SL",   tags:[],           emotion:"fear",   img:null,closePrice:2940},

  {id:uid(),date:"2025-03-18",direction:"BUY", entry:2895,sl:2878,tp:2950,lotSize:0.3,result:"Win", strategy:"Breakout",  timeframe:"H4",session:"London",   note:"",                   tags:["breakout"], emotion:"calm",   img:null,closePrice:2950},
  {id:uid(),date:"2025-03-25",direction:"SELL",entry:2960,sl:2975,tp:2920,lotSize:0.2,result:"Loss",strategy:"Resistance",timeframe:"H1",session:"Overlap",  note:"а№ғаёҲаёЈа№үаёӯаёҷ",             tags:[],           emotion:"fomo",   img:null,closePrice:2975},
  {id:uid(),date:"2025-04-02",direction:"SELL",entry:2980,sl:3000,tp:2930,lotSize:0.3,result:"Win", strategy:"Resistance",timeframe:"H1",session:"London",   note:"",                   tags:[],           emotion:"calm",   img:null,closePrice:2930},
  {id:uid(),date:"2025-04-08",direction:"BUY", entry:2945,sl:2925,tp:3010,lotSize:0.5,result:"Loss",strategy:"Breakout",  timeframe:"H4",session:"New York",note:"",                   tags:[],           emotion:"fomo",   img:null,closePrice:2925},
  {id:uid(),date:"2025-04-15",direction:"BUY", entry:2910,sl:2895,tp:2960,lotSize:0.4,result:"Open",strategy:"Trend",     timeframe:"H4",session:"London",   note:"аёЈаёӯаё”аё№",               tags:["trend"],    emotion:"greed",  img:null,closePrice:null},

// в”Җв”Җ App State в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const ST={tab:"journal",trades:loadTrades(),search:"",sortKey:"date",sortDir:"desc",chips:[],filterTf:"all",filterSession:"all",filterFrom:"",filterTo:"",calDate:new Date(),calSel:null,goldPrice:null,...loadSett()};

// в”Җв”Җ Stats в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function getStats(){
  const cl=ST.trades.filter(t=>t.result!=="Open");
  const wins=cl.filter(t=>t.result==="Win"),losses=cl.filter(t=>t.result==="Loss");
  const totPnL=cl.reduce((s,t)=>s+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0),0);
  const wPnL=wins.reduce((s,t)=>s+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0),0);
  const lAbs=Math.abs(losses.reduce((s,t)=>s+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0),0));
  const pf=lAbs>0?wPnL/lAbs:wins.length>0?Infinity:0;
  const wr=cl.length?(wins.length/cl.length)*100:0;
  const aW=wins.length?wPnL/wins.length:0,aL=losses.length?lAbs/losses.length:0;
  const exp=cl.length?(wr/100*aW-(1-wr/100)*aL):0;
  const rrs=cl.filter(t=>calcRR(t.entry,t.sl,t.tp)).map(t=>calcRR(t.entry,t.sl,t.tp));
  const aRR=rrs.length?rrs.reduce((s,v)=>s+v,0)/rrs.length:0;
  const sorted=[...cl].sort((a,b)=>a.date.localeCompare(b.date));
  let tW=0,tL=0,mW=0,mL=0;
  sorted.forEach(t=>{t.result==="Win"?(tW++,tL=0,mW=Math.max(mW,tW)):(tL++,tW=0,mL=Math.max(mL,tL));});
  const cur=sorted.length?(sorted[sorted.length-1].result==="Win"?tW:-tL):0;
  let peak=0,dd=0,c2=0;
  sorted.forEach(t=>{c2+=(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);if(c2>peak)peak=c2;if(peak-c2>dd)dd=peak-c2;});
  return{wins:wins.length,losses:losses.length,opens:ST.trades.filter(t=>t.result==="Open").length,totalPnL:totPnL,winRate:wr,pf,avgWin:aW,avgLoss:aL,expectancy:exp,avgRR:aRR,cur,mW,mL,maxDD:dd};
}

function getFiltered(){
  let list=[...ST.trades];
  if(ST.search){const q=ST.search.toLowerCase();list=list.filter(t=>t.strategy?.toLowerCase().includes(q)||t.note?.toLowerCase().includes(q)||t.tags?.some(g=>g.toLowerCase().includes(q))||t.session?.toLowerCase().includes(q));}
  if(ST.chips.includes("BUY"))       list=list.filter(t=>t.direction==="BUY");
  else if(ST.chips.includes("SELL")) list=list.filter(t=>t.direction==="SELL");
  if(ST.chips.includes("Win"))        list=list.filter(t=>t.result==="Win");
  else if(ST.chips.includes("Loss"))  list=list.filter(t=>t.result==="Loss");
  else if(ST.chips.includes("Open"))  list=list.filter(t=>t.result==="Open");
  if(ST.filterTf!=="all")      list=list.filter(t=>t.timeframe===ST.filterTf);
  if(ST.filterSession!=="all") list=list.filter(t=>t.session===ST.filterSession);
  if(ST.filterFrom) list=list.filter(t=>t.date>=ST.filterFrom);
  if(ST.filterTo)   list=list.filter(t=>t.date<=ST.filterTo);
  list.sort((a,b)=>{
    let va=a[ST.sortKey],vb=b[ST.sortKey];
    if(ST.sortKey==="rr"){va=calcRR(a.entry,a.sl,a.tp);vb=calcRR(b.entry,b.sl,b.tp);}
    if(ST.sortKey==="pnl"){va=calcPnL(a.entry,a.closePrice,a.sl,a.tp,a.lotSize,a.direction,a.result);vb=calcPnL(b.entry,b.closePrice,b.sl,b.tp,b.lotSize,b.direction,b.result);}
    if(va==null)return 1;if(vb==null)return-1;
    return ST.sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);
  });
  return list;
}

function getCurMoPnL(){
  const key=new Date().toISOString().slice(0,7);
  return ST.trades.filter(t=>t.result!=="Open"&&t.date.startsWith(key)).reduce((s,t)=>s+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0),0);
}

let toastTimer;
function showToast(msg,type="info"){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.style.cssText=`display:block;opacity:1;background:${type==="error"?"#3d1a1a":type==="success"?"#1a3d2e":"#2a1e00"};border:1px solid ${type==="error"?"#fc8181":type==="success"?"#3ecf8e":"#f6c90e"};color:#f0e6c8`;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.style.display="none",300);},2500);
}

async function fetchGold(){
  try{const r=await fetch("https://api.metals.live/v1/spot/gold");const d=await r.json();if(d&&d[0]?.gold)ST.goldPrice={price:d[0].gold,change:0};}

// в”Җв”Җ Export/Import в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function exportJSON(){
  const blob=new Blob([JSON.stringify({trades:ST.trades,settings:{goal:ST.goal,balance:ST.balance,maxRisk:ST.maxRisk}},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gold-journal-"+today()+".json";a.click();
  showToast("рҹ“Ө Export аёӘаёіа№ҖаёЈа№ҮаёҲ","success");
}
function importJSON(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.trades){ST.trades=d.trades;saveTrades();}if(d.settings){Object.assign(ST,{goal:d.settings.goal||500,balance:d.settings.balance||10000,maxRisk:d.settings.maxRisk||2});saveSett();}showToast("рҹ“Ҙ Import аёӘаёіа№ҖаёЈа№ҮаёҲ","success");render();}catch{showToast("вқҢ а№„аёҹаёҘа№Ңа№„аёЎа№Ҳаё–аё№аёҒаё•а№үаёӯаёҮ","error");}};
  r.readAsText(f);e.target.value="";
}

// в”Җв”Җ SVG Charts в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function svgCum(trades){
  const s=[...trades].filter(t=>t.result!=="Open").sort((a,b)=>a.date.localeCompare(b.date));
  if(!s.length)return`<div style="color:#8a7a5a;text-align:center;padding:12px;font-size:11px">аёўаёұаёҮа№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ</div>`;
  let c=0;const pts=[0,...s.map(t=>{c+=(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);return c;})];
  const w=280,h=80,mn=Math.min(...pts),mx=Math.max(...pts),rng=mx-mn||1;
  const sx=i=>(i/(pts.length-1))*(w-16)+8;const sy=v=>h-6-((v-mn)/rng)*(h-14);
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(p).toFixed(1)}`).join(" ");
  const fill=`${path} L${sx(pts.length-1).toFixed(1)},${h} L${sx(0).toFixed(1)},${h} Z`;
  const ip=pts[pts.length-1]>=0,col=ip?"#3ecf8e":"#fc8181";
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".4"/><stop offset="100%" stop-color="${col}" stop-opacity=".03"/></linearGradient></defs>
    <line x1="8" y1="${sy(0).toFixed(1)}" x2="${w-8}" y2="${sy(0).toFixed(1)}" stroke="#332820" stroke-width="1" stroke-dasharray="3,3"/>
    <path d="${fill}" fill="url(#cg)"/>
    <path d="${path}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>
    <circle cx="${sx(pts.length-1).toFixed(1)}" cy="${sy(pts[pts.length-1]).toFixed(1)}" r="3.5" fill="${col}"/>
  </svg>`;
}

function svgUW(trades){
  const s=[...trades].filter(t=>t.result!=="Open").sort((a,b)=>a.date.localeCompare(b.date));
  if(!s.length)return"";
  let c=0,peak=0;const dds=[0,...s.map(t=>{c+=(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);if(c>peak)peak=c;return-(peak-c);})];
  const w=280,h=50,mn=Math.min(...dds,-0.1),rng=Math.abs(mn)||1;
  const sx=i=>(i/(dds.length-1))*(w-16)+8;const sy=v=>4+((v-0)/(-rng))*(h-8);
  const path=dds.map((p,i)=>`${i===0?"M":"L"}${sx(i).toFixed(1)},${sy(p).toFixed(1)}`).join(" ");
  const fill=`${path} L${sx(dds.length-1).toFixed(1)},4 L${sx(0).toFixed(1)},4 Z`;
  return`<svg width="100%" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <defs><linearGradient id="dg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fc8181" stop-opacity=".05"/><stop offset="100%" stop-color="#fc8181" stop-opacity=".5"/></linearGradient></defs>
    <path d="${fill}" fill="url(#dg)"/>
    <path d="${path}" fill="none" stroke="#fc8181" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
}

function svgBar(data){
  if(!data.length)return`<div style="color:#8a7a5a;text-align:center;padding:10px;font-size:11px">а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ</div>`;
  const mx=Math.max(...data.map(d=>Math.abs(d.value)),1);
  return`<div style="display:flex;align-items:flex-end;gap:4px;height:76px;padding:0 2px">${data.map(d=>{
    const h=Math.max(3,(Math.abs(d.value)/mx)*62),pos=d.value>=0;
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="font-size:7px;color:${pos?"#3ecf8e":"#fc8181"};font-weight:600">${d.value>0?"+":""}${fmt(d.value,0)}</div>
      <div style="width:100%;height:${h}px;background:${pos?"linear-gradient(180deg,#3ecf8e,#2a9e6e)":"linear-gradient(180deg,#fc8181,#e05555)"};border-radius:3px 3px 0 0"></div>
      <div style="font-size:8px;color:#8a7a5a;text-align:center;max-width:32px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${d.label}</div>
    </div>`;}).join("")}</div>`;
}

function svgDonut(wins,losses,opens){
  const total=wins+losses+opens||1;
  const segs=[{v:wins,c:"#3ecf8e"},{v:losses,c:"#fc8181"},{v:opens,c:"#f6c90e"}];
  const r=44,cx=54,cy=54,sw=14,circ=2*Math.PI*r;let cum=0;
  return`<svg width="108" height="108" viewBox="0 0 108 108">${segs.map(s=>{const p=s.v/total,d=p*circ,o=-cum*circ;cum+=p;return`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${sw}" stroke-dasharray="${d} ${circ-d}" stroke-dashoffset="${o+circ*0.25}"/>`;}).join("")}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#f0e6c8" font-size="16" font-weight="700">${wins}</text>
    <text x="${cx}" y="${cy+10}" text-anchor="middle" fill="#8a7a5a" font-size="8">wins</text>
  </svg>`;
}

function renderStatsBar(){
  const s=getStats();
  const items=[
    {l:"PnL",    v:`$${fmtM(s.totalPnL)}`,          col:s.totalPnL>=0?"#3ecf8e":"#fc8181"},
    {l:"Win%",   v:`${fmt(s.winRate,0)}%`,            col:"#f6c90e"},
    {l:"PF",     v:isFinite(s.pf)?fmt(s.pf):"вҲһ",    col:s.pf>=1.5?"#3ecf8e":"#fc8181"},
    {l:"Streak", v:s.cur>0?`рҹ”Ҙ${s.cur}W`:s.cur<0?`вқ„пёҸ${Math.abs(s.cur)}L`:"вҖ”",col:s.cur>0?"#3ecf8e":s.cur<0?"#fc8181":"#8a7a5a"},
    {l:"Trades", v:ST.trades.length,                  col:"#f0e6c8"},
    {l:"MaxDD",  v:`$${fmt(s.maxDD,0)}`,              col:"#fc8181"},
    {l:"Exp.",   v:`$${fmt(s.expectancy,1)}`,          col:s.expectancy>=0?"#3ecf8e":"#fc8181"},
  ];
  document.getElementById("statsbar").innerHTML=
    `<div style="display:flex;gap:5px;min-width:max-content">`+
    items.map(i=>`<div style="background:#161310;border:1px solid #2a2520;border-radius:7px;padding:4px 8px;text-align:center;flex-shrink:0"><div style="color:#8a7a5a;font-size:8px">${i.l}</div><div style="color:${i.col};font-size:11px;font-weight:700">${i.v}</div></div>`).join("")+`</div>`;
}

// в”Җв”Җ Journal в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderJournal(){
  const filtered=getFiltered();
  const chipBar=[
    ...["BUY","SELL","Win","Loss","Open"].map(c=>{
      const ac=ST.chips.includes(c),col=c==="BUY"?"a-g":c==="SELL"?"a-r":c==="Win"?"a-g":c==="Loss"?"a-r":"a-a";
      return`<button class="chip ${ac?col:""}" onclick="toggleChip('${c}')">${c}</button>`;
    }),
    ...TFS.map(tf=>`<button class="chip ${ST.filterTf===tf?"a-a":""}" onclick="toggleTf('${tf}')">${tf}</button>`),
    ...SESSIONS.map(s=>`<button class="chip ${ST.filterSession===s?"a-b":""}" onclick="toggleSession('${s.replace(/ /g,"_")}')">${s}</button>`),
  ].join(" ");

  const cards=filtered.map(trade=>{
    const rr=calcRR(trade.entry,trade.sl,trade.tp);
    const pnl=calcPnL(trade.entry,trade.closePrice,trade.sl,trade.tp,trade.lotSize,trade.direction,trade.result);
    const em=EMOTIONS.find(e=>e.key===trade.emotion);
    const rc=rr>=2?"#3ecf8e":rr>=1?"#f6c90e":"#fc8181";
    const pc=pnl>0?"#3ecf8e":pnl<0?"#fc8181":"#8a7a5a";
    return`<div class="trade-card" style="border-left:3px solid ${em?.color||"#2a2520"}">
      <div style="padding:9px 10px 8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span style="background:${trade.direction==="BUY"?"#1a3d2e":"#3d1a1a"};color:${trade.direction==="BUY"?"#3ecf8e":"#fc8181"};padding:2px 7px;border-radius:5px;font-size:11px;font-weight:800">${trade.direction}</span>
            <span style="background:${trade.result==="Win"?"#1a3d2e":trade.result==="Loss"?"#3d1a1a":"#3d3010"};color:${trade.result==="Win"?"#3ecf8e":trade.result==="Loss"?"#fc8181":"#f6c90e"};padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600">${trade.result}</span>
            ${trade.timeframe?`<span style="color:#8a7a5a;font-size:10px;background:#1c1814;padding:2px 5px;border-radius:4px">${trade.timeframe}</span>`:""}
            ${trade.session?`<span style="color:#63b3ed;font-size:9px;background:#1a2a3d;padding:2px 5px;border-radius:4px">${trade.session}</span>`:""}
            ${em?`<span style="font-size:13px">${em.emoji}</span>`:""}
          </div>
          <div style="display:flex;gap:3px;flex-shrink:0">
            <button class="btn-sm" style="background:#1c1814;border:1px solid #2a2520" onclick="duplicateTrade('${trade.id}')" title="Duplicate">в§ү</button>
            <button class="btn-sm" style="background:#1c1814;border:1px solid #2a2520" onclick="editTrade('${trade.id}')">вңҸпёҸ</button>
            <button class="btn-sm" style="background:#3d1a1a;border:1px solid #fc818130" onclick="deleteTrade('${trade.id}')">рҹ—‘</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3px">
          <div>
            <div style="color:#8a7a5a;font-size:9px">Date</div>
            <div style="color:#f0e6c8;font-size:12px;font-weight:600">${trade.date.slice(5)}</div>
            ${trade.strategy?`<div style="color:#f6c90e;font-size:9px">${trade.strategy}</div>`:""}
          </div>
          <div style="text-align:right"><div style="color:#8a7a5a;font-size:9px">Entry</div><div style="color:#f0e6c8;font-size:12px">${trade.entry}</div></div>
          <div style="text-align:right"><div style="color:#8a7a5a;font-size:9px">R:R</div><div style="color:${rc};font-size:12px;font-weight:700">${rr?`1:${fmt(rr)}`:"вҖ”"}</div></div>
          <div style="text-align:right"><div style="color:#8a7a5a;font-size:9px">PnL</div><div style="color:${pc};font-size:12px;font-weight:700">${pnl!=null?`$${fmtM(pnl)}`:"вҖ”"}</div></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <span style="color:#8a7a5a;font-size:10px">SL <span style="color:#fc8181">${trade.sl}</span></span>
          <span style="color:#8a7a5a;font-size:10px">TP <span style="color:#3ecf8e">${trade.tp}</span></span>
          <span style="color:#8a7a5a;font-size:10px">Lot <span style="color:#f0e6c8">${trade.lotSize}</span></span>
        </div>
        ${trade.tags?.length?`<div style="margin-top:4px;display:flex;gap:3px;flex-wrap:wrap">${trade.tags.map(g=>`<span style="background:#3d3010;color:#f6c90e;padding:1px 6px;border-radius:16px;font-size:9px">${g}</span>`).join("")}</div>`:""}

      <input type="date" value="${ST.filterFrom}" onchange="ST.filterFrom=this.value;renderJournal()" style="flex:1;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;color:${ST.filterFrom?"#f0e6c8":"#8a7a5a"};font-size:10px;outline:none"/>

      <input type="date" value="${ST.filterTo}" onchange="ST.filterTo=this.value;renderJournal()" style="flex:1;background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:5px 7px;color:${ST.filterTo?"#f0e6c8":"#8a7a5a"};font-size:10px;outline:none"/>
      ${(ST.filterFrom||ST.filterTo)?`<button onclick="ST.filterFrom='';ST.filterTo='';renderJournal()" style="background:none;border:none;color:#8a7a5a;font-size:14px">вң•</button>`:""}
    </div>
    <div style="padding:0 12px 6px">
      <input class="finput" style="font-size:12px;padding:7px 10px" value="${ST.search}" oninput="ST.search=this.value;renderJournal()" placeholder="рҹ”Қ аё„а№үаёҷаё«аёІ strategy, note, tag..."/>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;padding:2px 12px;gap:3px;margin-bottom:2px">
      ${[["date","рҹ“…"],["entry","Entry"],["rr","R:R"],["pnl","PnL"]].map(([k,l])=>`<div onclick="toggleSort('${k}')" style="color:${ST.sortKey===k?"#f6c90e":"#8a7a5a"};font-size:9px;cursor:pointer;text-align:${k==="date"?"left":"right"}">${l}${ST.sortKey===k?(ST.sortDir==="asc"?"вҶ‘":"вҶ“"):""}</div>`).join("")}
    </div>

}

// в”Җв”Җ Dashboard в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderDashboard(){
  const s=getStats();
  const gPct=ST.goal?Math.min(100,(getCurMoPnL()/ST.goal)*100):0;
  const moMap={};ST.trades.filter(t=>t.result!=="Open").forEach(t=>{const m=t.date.slice(0,7);moMap[m]=(moMap[m]||0)+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);});
  const moData=Object.entries(moMap).sort().map(([k,v])=>({label:k.slice(5),value:v}));
  const sesMap={};ST.trades.filter(t=>t.result!=="Open"&&t.session).forEach(t=>{sesMap[t.session]=(sesMap[t.session]||0)+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);});
  const sesData=SESSIONS.map(s=>({label:s,value:sesMap[s]||0}));
  const stMap={};ST.trades.filter(t=>t.result!=="Open"&&t.strategy).forEach(t=>{stMap[t.strategy]=(stMap[t.strategy]||0)+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);});
  const stData=Object.entries(stMap).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({label:k,value:v}));
  const tfMap={};ST.trades.filter(t=>t.result!=="Open"&&t.timeframe).forEach(t=>{tfMap[t.timeframe]=(tfMap[t.timeframe]||0)+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);});
  const tfData=Object.entries(tfMap).map(([k,v])=>({label:k,value:v}));
  const emoMap={};ST.trades.filter(t=>t.result!=="Open"&&t.emotion).forEach(t=>{emoMap[t.emotion]=(emoMap[t.emotion]||0)+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0);});
  const emoData=EMOTIONS.map(em=>({label:em.emoji,value:emoMap[em.key]||0,color:em.color}));
  const emoMax=Math.max(...emoData.map(e=>Math.abs(e.value)),1);
  const earned=ACHIEVEMENTS.filter(a=>a.check(ST.trades,s)).map(a=>a.id);

  const C=(title,body)=>`<div class="card"><div style="color:#8a7a5a;font-size:10px;margin-bottom:6px">${title}</div>${body}</div>`;

  document.getElementById("content").innerHTML=`<div style="padding:0 12px 70px">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      ${[{i:"рҹ’°",l:"Total PnL",v:`$${fmtM(s.totalPnL)}`,c:s.totalPnL>=0?"#3ecf8e":"#fc8181"},{i:"рҹҺҜ",l:"Win Rate",v:`${fmt(s.winRate)}%`,c:"#f6c90e"},{i:"рҹ“Ҡ",l:"Profit Factor",v:isFinite(s.pf)?fmt(s.pf):"вҲһ",c:s.pf>=1.5?"#3ecf8e":"#fc8181"},{i:"рҹ“ү",l:"Max DD",v:`$${fmt(s.maxDD)}`,c:"#fc8181"}].map(x=>`<div class="card" style="margin-bottom:0"><div style="color:#8a7a5a;font-size:10px">${x.i} ${x.l}</div><div style="color:${x.c};font-size:19px;font-weight:800;margin-top:1px">${x.v}</div></div>`).join("")}
    </div>

    ${C("рҹ“җ Advanced Stats",`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      ${[{l:"Avg Win",v:`$${fmt(s.avgWin)}`,c:"#3ecf8e"},{l:"Avg Loss",v:`$${fmt(s.avgLoss)}`,c:"#fc8181"},{l:"Expectancy",v:`$${fmt(s.expectancy)}`,c:s.expectancy>=0?"#3ecf8e":"#fc8181"},{l:"Avg R:R",v:`1:${fmt(s.avgRR)}`,c:"#f6c90e"},{l:"Total",v:ST.trades.length,c:"#f0e6c8"},{l:"Open",v:s.opens,c:"#f6c90e"}].map(x=>`<div><div style="color:#8a7a5a;font-size:9px">${x.l}</div><div style="color:${x.c};font-size:13px;font-weight:700">${x.v}</div></div>`).join("")}
    </div>`)}

    ${C("рҹ”Ҙ Streak",`<div style="display:flex;gap:14px;flex-wrap:wrap">
      <div><span style="color:#8a7a5a;font-size:10px">аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ </span><span style="color:${s.cur>=0?"#3ecf8e":"#fc8181"};font-weight:700;font-size:13px">${s.cur>0?`рҹ”Ҙ${s.cur}W`:s.cur<0?`вқ„пёҸ${Math.abs(s.cur)}L`:"вҖ”"}</span></div>
      <div><span style="color:#8a7a5a;font-size:10px">Best Win </span><span style="color:#3ecf8e;font-weight:700">${s.mW}рҹҸҶ</span></div>
      <div><span style="color:#8a7a5a;font-size:10px">Max Loss </span><span style="color:#fc8181;font-weight:700">${s.mL}рҹ’”</span></div>
    </div>`)}

    ${C("",`<div style="display:flex;justify-content:space-between;margin-bottom:5px">
      <span style="color:#8a7a5a;font-size:10px">рҹҺҜ а№Җаёӣа№үаёІаё«аёЎаёІаёўа№Җаё”аё·аёӯаёҷаёҷаёөа№ү</span>
      <span style="color:#f6c90e;font-size:11px;font-weight:700">$${fmt(getCurMoPnL(),0)} / $${ST.goal}</span>
    </div>
    <div style="background:#1c1814;border-radius:5px;height:8px;overflow:hidden">
      <div style="width:${Math.max(0,gPct)}%;height:100%;background:${gPct>=100?"#3ecf8e":gPct>=50?"#f6c90e":"#fc8181"};border-radius:5px"></div>
    </div>
    <div style="color:#8a7a5a;font-size:9px;margin-top:2px">${fmt(gPct,0)}% аёӘаёіа№ҖаёЈа№ҮаёҲ</div>`)}

    ${C("рҹҸ… Achievements",`<div style="display:flex;flex-wrap:wrap;gap:4px">
      ${ACHIEVEMENTS.map(a=>{const has=earned.includes(a.id);return`<div style="background:${has?"#2a1e00":"#1c1814"};border:1px solid ${has?"#f6c90e":"#2a2520"};border-radius:8px;padding:4px 8px;opacity:${has?1:0.35};display:flex;align-items:center;gap:3px"><span style="font-size:13px">${a.icon}</span><span style="color:${has?"#f6c90e":"#8a7a5a"};font-size:9px;font-weight:600">${a.label}</span></div>`;}).join("")}
    </div>`)}

    ${C("рҹ“Ҳ Cumulative PnL",svgCum(ST.trades))}
    ${C("рҹ“ү Drawdown",svgUW(ST.trades)+`<div style="color:#fc8181;font-size:9px;margin-top:2px">Max DD: $${fmt(s.maxDD)}</div>`)}
    ${C("рҹ“… PnL аёЈаёІаёўа№Җаё”аё·аёӯаёҷ",svgBar(moData))}
    ${C("вҸ° PnL аё•аёІаёЎ Session",svgBar(sesData))}
    ${stData.length?C("рҹҸ·пёҸ PnL аё•аёІаёЎ Strategy",svgBar(stData)):""}
    ${tfData.length?C("рҹ“Ҡ PnL аё•аёІаёЎ Timeframe",svgBar(tfData)):""}

    <div class="card" style="display:flex;align-items:center;gap:12px">
      ${svgDonut(s.wins,s.losses,s.opens)}
      <div>${[{l:"Win",v:s.wins,c:"#3ecf8e"},{l:"Loss",v:s.losses,c:"#fc8181"},{l:"Open",v:s.opens,c:"#f6c90e"}].map(x=>`<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px"><div style="width:8px;height:8px;background:${x.c};border-radius:2px"></div><span style="color:#8a7a5a;font-size:11px">${x.l}: </span><span style="color:#f0e6c8;font-weight:700;font-size:11px">${x.v}</span></div>`).join("")}</div>
    </div>

    ${C("рҹ§  PnL аё•аёІаёЎ Emotion",`<div style="display:flex;gap:4px">${emoData.map(em=>{const h=Math.max(3,(Math.abs(em.value)/emoMax)*55);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:1px"><div style="font-size:7px;color:${em.value>=0?"#3ecf8e":"#fc8181"}">${em.value>0?"+":""}${fmt(em.value,0)}</div><div style="width:100%;height:${h}px;background:${em.color};border-radius:3px 3px 0 0;opacity:0.85"></div><div style="font-size:13px">${em.label}</div></div>`;}).join("")}</div>`)}
  </div>`;
}

// в”Җв”Җ Calendar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderCalendar(){
  const y=ST.calDate.getFullYear(),m=ST.calDate.getMonth();
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const mStr=`${y}-${String(m+1).padStart(2,"0")}`;
  const dMap={};ST.trades.filter(t=>t.date.startsWith(mStr)).forEach(t=>{const d=parseInt(t.date.slice(8));if(!dMap[d])dMap[d]=[];dMap[d].push(t);});
  const selTrades=ST.calSel?ST.trades.filter(t=>t.date===`${y}-${String(m+1).padStart(2,"0")}-${String(ST.calSel).padStart(2,"0")}`):[];

  document.getElementById("content").innerHTML=`<div style="padding:0 12px 70px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <button onclick="prevMonth()" style="background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:6px 12px;color:#f0e6c8;cursor:pointer;font-size:14px">вҖ№</button>
      <span style="color:#f0e6c8;font-weight:700;font-size:13px">${ST.calDate.toLocaleString("th-TH",{month:"long",year:"numeric"})}</span>
      <button onclick="nextMonth()" style="background:#1c1814;border:1px solid #2a2520;border-radius:7px;padding:6px 12px;color:#f0e6c8;cursor:pointer;font-size:14px">вҖә</button>
    </div>
    <div class="cal-grid" style="margin-bottom:2px">
      ${["аёӯаёІ","аёҲ","аёӯ","аёһ","аёһаёӨ","аёЁ","аёӘ"].map(d=>`<div style="text-align:center;color:#8a7a5a;font-size:9px;padding:2px 0">${d}</div>`).join("")}
    </div>
    <div class="cal-grid" style="margin-bottom:10px">
      ${Array(first).fill(`<div></div>`).join("")}
      ${Array.from({length:days},(_,i)=>{
        const d=i+1,ts=dMap[d]||[];
        const tot=ts.reduce((s,t)=>s+(calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result)||0),0);
        const has=ts.length>0;
        return`<div class="cal-day" onclick="selectCalDay(${d})" style="background:${has?(tot>0?"#1a3d2e":tot<0?"#3d1a1a":"#3d3010"):"transparent"};border-color:${ST.calSel===d?"#f6c90e":has?(tot>0?"#3ecf8e":tot<0?"#fc8181":"#f6c90e"):"#2a2520"}">
          <div style="color:${has?(tot>0?"#3ecf8e":tot<0?"#fc8181":"#f6c90e"):"#8a7a5a"};font-size:11px;font-weight:${has?700:400}">${d}</div>
          ${has?`<div style="color:${tot>0?"#3ecf8e":"#fc8181"};font-size:7px">${ts.length}T</div>`:""}
        </div>`;
      }).join("")}
    </div>
    ${ST.calSel&&selTrades.length?`
      <div style="color:#f0e6c8;font-weight:700;margin-bottom:6px;font-size:12px">рҹ“… ${ST.calSel}/${m+1}/${y}</div>
      ${selTrades.map(t=>{const pnl=calcPnL(t.entry,t.closePrice,t.sl,t.tp,t.lotSize,t.direction,t.result);return`
        <div style="background:#1c1814;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="color:${t.direction==="BUY"?"#3ecf8e":"#fc8181"};font-weight:700;margin-right:6px;font-size:12px">${t.direction}</span>
            <span style="color:#8a7a5a;font-size:11px">${t.strategy||"вҖ”"} В· ${t.timeframe}</span>
            ${t.session?`<span style="color:#63b3ed;font-size:9px;margin-left:5px">${t.session}</span>`:""}
          </div>
          <span style="color:${pnl>0?"#3ecf8e":pnl<0?"#fc8181":"#8a7a5a"};font-weight:700;font-size:12px">${pnl!=null?`$${fmtM(pnl)}`:"Open"}</span>
        </div>`;}).join("")}
    `:""}
  </div>`;
}

// в”Җв”Җ Form в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let formState={};

function openForm(trade=null){
  formState=trade?{...trade}:{date:today(),direction:"BUY",entry:"",sl:"",tp:"",lotSize:0.1,result:"Open",strategy:"",timeframe:"H4",session:"London",note:"",tags:[],emotion:"neutral",img:null,closePrice:""};
  ST.editTrade=trade;
  renderForm();
}

function renderForm(){
  const f=formState;
  const rr=calcRR(+f.entry,+f.sl,+f.tp);
  const pnl=f.result!=="Open"?calcPnL(+f.entry,+f.closePrice||null,+f.sl,+f.tp,+f.lotSize,f.direction,f.result):null;
  const rPct=ST.balance&&f.entry&&f.sl?(Math.abs(+f.entry-+f.sl)*(+f.lotSize||0)*100/ST.balance*100):null;
  const rOver=rPct&&rPct>ST.maxRisk;
  const rc=rr>=2?"#3ecf8e":rr>=1?"#f6c90e":"#fc8181";
  const pc=pnl>0?"#3ecf8e":pnl<0?"#fc8181":"#8a7a5a";
  document.getElementById("form-sheet")?.remove();
  const ov=document.createElement("div");
  ov.className="sheet-overlay";ov.id="form-sheet";
  ov.onclick=e=>{if(e.target===ov)closeForm();};
  ov.innerHTML=`<div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:#f0e6c8;font-size:15px;font-weight:700">${ST.editTrade?"вңҸпёҸ а№ҒаёҒа№үа№„аёӮа№Җаё—аёЈаё”":"рҹ“қ аёҡаёұаёҷаё—аё¶аёҒа№ғаё«аёЎа№Ҳ"}</span>
      <button onclick="closeForm()" style="background:none;border:none;color:#8a7a5a;font-size:20px">вң•</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      ${[{l:"R:R",v:rr?`1:${fmt(rr)}`:"вҖ”",c:rc},{l:"PnL",v:pnl!=null?`$${fmtM(pnl)}`:"вҖ”",c:pc},{l:"Risk%",v:rPct!=null?`${fmt(rPct)}%`:"вҖ”",c:rOver?"#fc8181":"#3ecf8e"}].map(it=>`<div style="flex:1;background:#1c1814;border-radius:8px;padding:7px 3px;text-align:center;border:1px solid ${it.c}20"><div style="color:#8a7a5a;font-size:9px">${it.l}</div><div style="color:${it.c};font-size:14px;font-weight:700">${it.v}</div></div>`).join("")}
    </div>
    ${rOver?`<div style="background:#3d1a1a;border:1px solid #fc818140;border-radius:7px;padding:6px 9px;margin-bottom:8px;color:#fc8181;font-size:11px">вҡ пёҸ Risk ${fmt(rPct)}% а№ҖаёҒаёҙаёҷаёӮаёөаё”аёҲаёіаёҒаёұаё” ${ST.maxRisk}%</div>`:""}
    ${[{k:"date",l:"рҹ“… аё§аёұаёҷаё—аёөа№Ҳ",type:"date"},{k:"entry",l:"Entry",type:"number"},{k:"sl",l:"Stop Loss",type:"number"},{k:"tp",l:"Take Profit",type:"number"},{k:"lotSize",l:"Lot Size",type:"number"},{k:"closePrice",l:"Close Price",type:"number"},{k:"strategy",l:"рҹҸ·пёҸ Strategy",type:"text"}].map(({k,l,type})=>`
      <div style="margin-bottom:8px">
        <label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:2px">${l}</label>
        <input type="${type}" class="finput" id="fi-${k}" value="${f[k]||""}" oninput="formState['${k}']=this.value;updatePreview()"/>
      </div>`).join("")}
    <div style="margin-bottom:8px">
      <label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Direction</label>
      <div style="display:flex;gap:6px">${["BUY","SELL"].map(d=>`<button onclick="formState.direction='${d}';renderForm()" style="flex:1;padding:8px;border-radius:8px;border:2px solid ${f.direction===d?(d==="BUY"?"#3ecf8e":"#fc8181"):"#2a2520"};background:${f.direction===d?(d==="BUY"?"#1a3d2e":"#3d1a1a"):"#1c1814"};color:${f.direction===d?(d==="BUY"?"#3ecf8e":"#fc8181"):"#8a7a5a"};font-weight:800;cursor:pointer;font-size:13px">${d}</button>`).join("")}</div>
    </div>
    <div style="margin-bottom:8px">
      <label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Result</label>
      <div style="display:flex;gap:5px">${["Win","Loss","Open"].map(r=>`<button onclick="formState.result='${r}';renderForm()" style="flex:1;padding:8px;border-radius:8px;border:2px solid ${f.result===r?(r==="Win"?"#3ecf8e":r==="Loss"?"#fc8181":"#f6c90e"):"#2a2520"};background:${f.result===r?(r==="Win"?"#1a3d2e":r==="Loss"?"#3d1a1a":"#3d3010"):"#1c1814"};color:${f.result===r?(r==="Win"?"#3ecf8e":r==="Loss"?"#fc8181":"#f6c90e"):"#8a7a5a"};font-weight:700;cursor:pointer;font-size:11px">${r}</button>`).join("")}</div>
    </div>
    <div style="margin-bottom:8px">
      <label style="color:#8a7a5a;font-size:10px;display:block;margin-bottom:4px">Timeframe</label>
      <div style="display:flex;flex-wrap:wrap;gap:4px">${TFS.map(tf=>`<button onclick="formState.timeframe='${tf}';renderForm()" style="padding:5px 9px;border-radius:6px;border:1.5px solid ${f.timeframe===tf?"#f6c90e":"#2a2520"};background:${f.timeframe===tf?"#3d3010":"#1c1814"};color:${f.timeframe===tf?"#f6c90e":"#8a7a5a"};font-size:11px;cursor:pointer">${tf}</button>`).join("")}</div>
    </div>

function updatePreview(){
const f=formState;
const rr=calcRR(+f.entry,+f.sl,+f.tp);
const pnl=f.result!==вҖңOpenвҖқ?calcPnL(+f.entry,+f.closePrice||null,+f.sl,+f.tp,+f.lotSize,f.direction,f.result):null;
const rPct=ST.balance&&f.entry&&f.sl?(Math.abs(+f.entry-+f.sl)*(+f.lotSize||0)*100/ST.balance*100):null;
// Update preview boxes without full re-render
const boxes=document.querySelectorAll(вҖқ#form-sheet .sheet > div:nth-child(3) > divвҖқ);
if(boxes.length>=3){
const rc=rr>=2?вҖқ#3ecf8eвҖқ:rr>=1?вҖқ#f6c90eвҖқ:вҖқ#fc8181вҖқ;
const pc=pnl>0?вҖқ#3ecf8eвҖқ:pnl<0?вҖқ#fc8181вҖқ:вҖқ#8a7a5aвҖқ;
const rOver=rPct&&rPct>ST.maxRisk;
boxes[0].querySelector(вҖңdiv:last-childвҖқ).style.color=rc;boxes[0].querySelector(вҖңdiv:last-childвҖқ).textContent=rr?`1:${fmt(rr)}`:вҖқвҖ”вҖқ;
boxes[1].querySelector(вҖңdiv:last-childвҖқ).style.color=pc;boxes[1].querySelector(вҖңdiv:last-childвҖқ).textContent=pnl!=null?`$${fmtM(pnl)}`:вҖқвҖ”вҖқ;
boxes[2].querySelector(вҖңdiv:last-childвҖқ).style.color=rOver?вҖқ#fc8181вҖқ:вҖқ#3ecf8eвҖқ;boxes[2].querySelector(вҖңdiv:last-childвҖқ).textContent=rPct!=null?`${fmt(rPct)}%`:вҖқвҖ”вҖқ;
}
}

function appendNote(t){formState.note=(formState.note||вҖқвҖқ)+t;const el=document.getElementById(вҖңfi-noteвҖқ);if(el)el.value=formState.note;}
function addTag(){const el=document.getElementById(вҖңtag-inвҖқ);if(!el||!el.value.trim())return;formState.tags=[вҖҰ(formState.tags||[]),el.value.trim()];el.value=вҖқвҖқ;const d=document.getElementById(вҖңtags-dвҖқ);if(d)d.innerHTML=(formState.tags||[]).map(tag=>`<span style="background:#3d3010;color:#f6c90e;padding:2px 8px;border-radius:16px;font-size:10px">${tag} <span onclick="removeTag('${tag}')" style="cursor:pointer">вң•</span></span>`).join(вҖқвҖқ);}
function removeTag(tag){formState.tags=(formState.tags||[]).filter(t=>t!==tag);const d=document.getElementById(вҖңtags-dвҖқ);if(d)d.innerHTML=(formState.tags||[]).map(tag=>`<span style="background:#3d3010;color:#f6c90e;padding:2px 8px;border-radius:16px;font-size:10px">${tag} <span onclick="removeTag('${tag}')" style="cursor:pointer">вң•</span></span>`).join(вҖқвҖқ);}
function handleImg(input){handleImgFile(input.files[0]);}
function handleImgFile(file){if(!file||!file.type.startsWith(вҖңimage/вҖқ))return;const r=new FileReader();r.onload=e=>{formState.img=e.target.result.split(вҖқ,вҖқ)[1];renderForm();};r.readAsDataURL(file);}

function saveForm(){
const f={вҖҰformState,id:formState.id||uid(),entry:+formState.entry,sl:+formState.sl,tp:+formState.tp,lotSize:+formState.lotSize,closePrice:formState.closePrice?+formState.closePrice:null};
const rPct=ST.balance&&f.entry&&f.sl?(Math.abs(f.entry-f.sl)*(f.lotSize||0)*100/ST.balance*100):null;
if(rPct&&rPct>ST.maxRisk){document.getElementById(вҖңrisk-msgвҖқ).textContent=`Risk ${fmt(rPct)}% а№ҖаёҒаёҙаёҷаёӮаёөаё”аёҲаёіаёҒаёұаё” ${ST.maxRisk}%`;document.getElementById(вҖңrisk-warnвҖқ).style.display=вҖңblockвҖқ;}
ST.trades=ST.editTrade?ST.trades.map(t=>t.id===f.id?f:t):[f,вҖҰST.trades];
saveTrades();showToast(ST.editTrade?вҖңвңҸпёҸ а№ҒаёҒа№үа№„аёӮа№ҒаёҘа№үаё§вҖқ:вҖңвң… аёҡаёұаёҷаё—аё¶аёҒа№ҒаёҘа№үаё§вҖқ,вҖңsuccessвҖқ);
closeForm();render();
}

function duplicateTrade(id){const t=ST.trades.find(x=>x.id===id);if(!t)return;ST.trades=[{вҖҰt,id:uid(),date:today()},вҖҰST.trades];saveTrades();showToast(вҖңрҹ“Ӣ Duplicate а№ҒаёҘа№үаё§вҖқ);renderJournal();renderStatsBar();}
