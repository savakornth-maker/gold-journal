*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-size:13px}

<script>
// ── Firebase ───────────────────────────────────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyAdpF6MhHmlkAukNFUJzBL_Zx4Q_u607KU",
  authDomain: "gold-journal-f724e.firebaseapp.com",
  projectId: "gold-journal-f724e",
  storageBucket: "gold-journal-f724e.firebasestorage.app",
  messagingSenderId: "229085203148",
  appId: "1:229085203148:web:e35eec88aa84788461d069",
  measurementId: "G-5V3PWD15PD"
};
try { firebase.initializeApp(firebaseConfig); } catch(e) {}
var db = null, auth = null, CU = null;
try { db = firebase.firestore(); auth = firebase.auth(); } catch(e) {}

function signInGoogle() {
  if (!auth) return;
  var p = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(p).catch(function() { auth.signInWithRedirect(p); });
}
function signOut() {
  if (!auth) return;
  auth.signOut().then(function() { CU = null; document.getElementById("app").style.display="none"; document.getElementById("loginpage").style.display="flex"; });
}
if (auth) {
  auth.onAuthStateChanged(function(u) {
    if (u) {
      CU = u;
      document.getElementById("loginpage").style.display = "none";
      document.getElementById("app").style.display = "flex";
      fbLoad();
    } else {
      CU = null;
      document.getElementById("app").style.display = "none";
      document.getElementById("loginpage").style.display = "flex";
    }
  });
  auth.getRedirectResult().catch(function() {});
}
function fbSave(key, data) {
  if (!db || !CU) return;
  try { var o = {}; o[key] = JSON.stringify(data); o.updated = Date.now(); db.collection("journals").doc(CU.uid).set(o, {merge:true}); } catch(e) {}
}
function fbLoad() {
  if (!db || !CU) { render(); return; }
  db.collection("journals").doc(CU.uid).get().then(function(doc) {
    if (doc.exists) {
      var d = doc.data();
      if (d.trades) { try { var t=JSON.parse(d.trades); if(t&&t.length) G.t=t; } catch(e) {} }
      if (d.settings) { try { var s=JSON.parse(d.settings); if(s){G.goal=s.goal||500;G.bal=s.bal||10000;G.mrisk=s.mrisk||2;G.dark=s.dark!==undefined?s.dark:true;} } catch(e) {} }
    }
    render();
  }).catch(function() { render(); });
}

// ── Constants ──────────────────────────────────────────────────────────────────
var EMO = [
  {key:"calm",   lbl:"สงบ", em:"😌", col:"#3ecf8e"},
  {key:"neutral",lbl:"ปกติ",em:"😐", col:"#a0aec0"},
  {key:"fear",   lbl:"กลัว",em:"😰", col:"#667eea"},
  {key:"greed",  lbl:"โลภ", em:"🤑", col:"#f6ad55"},
  {key:"fomo",   lbl:"FOMO",em:"😤", col:"#fc8181"}
];
var TF = ["M1","M5","M15","M30","H1","H4","D1","W1"];
var SES = ["Asian","London","New York","Overlap"];

// ── Helpers ────────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2,10); }
function td() { return new Date().toISOString().slice(0,10); }
function f2(n,d) { if(n==null||isNaN(n))return"—"; return Number(n).toFixed(d==null?2:d); }
function fm(n) { if(n==null||isNaN(n))return"—"; return(n>=0?"+":"")+f2(n); }
function rr(e,sl,tp) { if(!e||!sl||!tp)return null; var r=Math.abs(e-sl),w=Math.abs(tp-e); return r===0?null:w/r; }
function pnl(e,cp,sl,tp,lot,dir,res) {
  if(res==="Open")return null;
  var cl = cp ? cp : (res==="Win"?tp:sl);
  return (dir==="BUY"?cl-e:e-cl)*(lot||0)*100;
}

// ── Period Filter ──────────────────────────────────────────────────────────────
function getPeriodDates(period) {
  var now = new Date();
  var from, to = td();
  if (period === "day") {
    from = td();
  } else if (period === "week") {
    var d = new Date(now);
    d.setDate(d.getDate() - d.getDay());
    from = d.toISOString().slice(0,10);
  } else if (period === "month") {
    from = now.getFullYear()+"-"+(now.getMonth()<9?"0":"")+(now.getMonth()+1)+"-01";
  } else if (period === "year") {
    from = now.getFullYear()+"-01-01";
  } else {
    return null; // all time
  }
  return {from:from, to:to};
}
function filterByPeriod(trades, period) {
  if (period === "all") return trades;
  var p = getPeriodDates(period);
  if (!p) return trades;
  return trades.filter(function(t) { return t.date >= p.from && t.date <= p.to; });
}

// ── Storage ────────────────────────────────────────────────────────────────────
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsGet(k){try{var d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch(e){return null;}}
function svt(){lsSet("gj4",G.t);fbSave("trades",G.t);}
function svs(){var s={goal:G.goal,bal:G.bal,mrisk:G.mrisk,dark:G.dark};lsSet("gj4s",s);fbSave("settings",s);}

// ── State ──────────────────────────────────────────────────────────────────────
var saved = lsGet("gj4s")||{goal:500,bal:10000,mrisk:2,dark:true};
var G = {
  tab:"journal", t:lsGet("gj4")||[],
  search:"", sk:"date", sd:"desc",
  chips:[], ftf:"all", fses:"all", ffrom:"", fto:"",
  jperiod:"all", dperiod:"month",
  cdate:new Date(), csel:null,
  etrade:null,
  goal:saved.goal, bal:saved.bal, mrisk:saved.mrisk, dark:saved.dark
};

// ── Stats ──────────────────────────────────────────────────────────────────────
function calcStats(trades) {
  var cl = trades.filter(function(x){return x.result!=="Open"});
  var w  = cl.filter(function(x){return x.result==="Win"});
  var l  = cl.filter(function(x){return x.result==="Loss"});
  var tot= cl.reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
  var wp = w.reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
  var la = Math.abs(l.reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0));
  var wr = cl.length ? w.length/cl.length*100 : 0;
  var aw = w.length ? wp/w.length : 0;
  var al = l.length ? la/l.length : 0;
  var pf = la>0 ? wp/la : w.length>0 ? Infinity : 0;
  var exp= cl.length ? (wr/100*aw - (1-wr/100)*al) : 0;
  var rrs= cl.filter(function(x){return rr(x.entry,x.sl,x.tp)}).map(function(x){return rr(x.entry,x.sl,x.tp)});
  var arr= rrs.length ? rrs.reduce(function(s,v){return s+v},0)/rrs.length : 0;
  var sorted = cl.slice().sort(function(a,b){return a.date<b.date?-1:1});
  var tw=0,tl=0,mw=0,ml=0;
  sorted.forEach(function(x){if(x.result==="Win"){tw++;tl=0;if(tw>mw)mw=tw;}else{tl++;tw=0;if(tl>ml)ml=tl;}});
  var cur = sorted.length ? (sorted[sorted.length-1].result==="Win"?tw:-tl) : 0;
  var pk=0,dd=0,c2=0;
  sorted.forEach(function(x){c2+=(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0);if(c2>pk)pk=c2;if(pk-c2>dd)dd=pk-c2;});
  // Best strategy
  var stMap={};
  cl.forEach(function(x){
    if(!x.strat)return;
    if(!stMap[x.strat])stMap[x.strat]={p:0,n:0};
    stMap[x.strat].p+=(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0);
    stMap[x.strat].n++;
  });
  var bestStrat=null, bestPnl=-Infinity;
  Object.keys(stMap).forEach(function(k){if(stMap[k].p>bestPnl){bestPnl=stMap[k].p;bestStrat=k;}});
  return {w:w.length,l:l.length,op:trades.filter(function(x){return x.result==="Open"}).length,
    tot:tot,wr:wr,pf:pf,aw:aw,al:al,exp:exp,arr:arr,cur:cur,mw:mw,ml:ml,dd:dd,
    bestStrat:bestStrat,bestStratPnl:bestStrat?bestPnl:0,stMap:stMap};
}

function curMoPnL() {
  var k = new Date().toISOString().slice(0,7);
  return G.t.filter(function(x){return x.result!=="Open"&&x.date.indexOf(k)===0})
    .reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0)},0);
}

function getFiltered() {
  var list = G.t.slice();
  // Period filter
  list = filterByPeriod(list, G.jperiod);
  if(G.search){var q=G.search.toLowerCase();list=list.filter(function(x){return(x.strat||"").toLowerCase().indexOf(q)>=0||(x.note||"").toLowerCase().indexOf(q)>=0||(x.tags||[]).some(function(g){return g.toLowerCase().indexOf(q)>=0})||(x.ses||"").toLowerCase().indexOf(q)>=0});}
  if(G.chips.indexOf("BUY")>=0)list=list.filter(function(x){return x.dir==="BUY"});
  else if(G.chips.indexOf("SELL")>=0)list=list.filter(function(x){return x.dir==="SELL"});
  if(G.chips.indexOf("Win")>=0)list=list.filter(function(x){return x.result==="Win"});
  else if(G.chips.indexOf("Loss")>=0)list=list.filter(function(x){return x.result==="Loss"});
  else if(G.chips.indexOf("Open")>=0)list=list.filter(function(x){return x.result==="Open"});
  if(G.ftf!=="all")list=list.filter(function(x){return x.tf===G.ftf});
  if(G.fses!=="all")list=list.filter(function(x){return x.ses===G.fses});
  if(G.ffrom)list=list.filter(function(x){return x.date>=G.ffrom});
  if(G.fto)list=list.filter(function(x){return x.date<=G.fto});
  list.sort(function(a,b){
    var va=a[G.sk],vb=b[G.sk];
    if(G.sk==="rr"){va=rr(a.entry,a.sl,a.tp);vb=rr(b.entry,b.sl,b.tp);}
    if(G.sk==="pnl"){va=pnl(a.entry,a.cp,a.sl,a.tp,a.lot,a.dir,a.result);vb=pnl(b.entry,b.cp,b.sl,b.tp,b.lot,b.dir,b.result);}
    if(va==null)return 1;if(vb==null)return -1;
    return G.sd==="asc"?(va>vb?1:-1):(va<vb?1:-1);
  });
  return list;
}

// ── Toast / Lightbox ───────────────────────────────────────────────────────────
var tt;
function toast(msg,type){
  var el=document.getElementById("toast");
  el.textContent=msg;
  el.style.cssText="display:block;opacity:1;background:"+(type==="err"?"#3d1a1a":type==="ok"?"#1a3d2e":"#2a1e00")+";border:1px solid "+(type==="err"?"#fc8181":type==="ok"?"#3ecf8e":"#f6c90e")+";color:#f0e6c8";
  clearTimeout(tt);tt=setTimeout(function(){el.style.opacity="0";setTimeout(function(){el.style.display="none"},300)},2400);
}
function openLB(b64, cap) {
  document.getElementById("lbimg").src = "data:image/jpeg;base64,"+b64;
  document.getElementById("lbcap").textContent = cap||"";
  document.getElementById("lb").style.display = "flex";
}
function closeLB(){document.getElementById("lb").style.display="none";}

// ── SVG Charts ─────────────────────────────────────────────────────────────────
function svgLine(trades){
  var s=trades.filter(function(x){return x.result!=="Open"}).sort(function(a,b){return a.date<b.date?-1:1});
  if(!s.length)return'<div style="color:#8a7a5a;text-align:center;padding:12px;font-size:11px">ยังไม่มีข้อมูล</div>';
  var c=0;var pts=[0];s.forEach(function(x){c+=(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0);pts.push(c);});
  var W=280,H=80,mn=Math.min.apply(null,pts),mx=Math.max.apply(null,pts),rng=mx-mn||1;
  var sx=function(i){return(i/(pts.length-1))*(W-16)+8;};
  var sy=function(v){return H-6-((v-mn)/rng)*(H-14);};
  var path=pts.map(function(p,i){return(i===0?"M":"L")+sx(i).toFixed(1)+","+sy(p).toFixed(1);}).join(" ");
  var fill=path+" L"+sx(pts.length-1).toFixed(1)+","+H+" L"+sx(0).toFixed(1)+","+H+" Z";
  var ip=pts[pts.length-1]>=0,col=ip?"#3ecf8e":"#fc8181";
  return'<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".4"/><stop offset="100%" stop-color="'+col+'" stop-opacity=".03"/></linearGradient></defs><line x1="8" y1="'+sy(0).toFixed(1)+'" x2="'+(W-8)+'" y2="'+sy(0).toFixed(1)+'" stroke="#332820" stroke-width="1" stroke-dasharray="3,3"/><path d="'+fill+'" fill="url(#g1)"/><path d="'+path+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/><circle cx="'+sx(pts.length-1).toFixed(1)+'" cy="'+sy(pts[pts.length-1]).toFixed(1)+'" r="3.5" fill="'+col+'"/></svg>';
}
function svgBar(data){
  if(!data.length)return'<div style="color:#8a7a5a;text-align:center;padding:10px;font-size:11px">ไม่มีข้อมูล</div>';
  var mx=Math.max.apply(null,data.map(function(d){return Math.abs(d.v)}));if(!mx)mx=1;
  return'<div style="display:flex;align-items:flex-end;gap:4px;height:76px;padding:0 2px">'+data.map(function(d){
    var h=Math.max(3,(Math.abs(d.v)/mx)*62),pos=d.v>=0;

function svgDonut(w,l,o){
  var tot=w+l+o||1;var segs=[{v:w,c:"#3ecf8e"},{v:l,c:"#fc8181"},{v:o,c:"#f6c90e"}];
  var R=44,cx=54,cy=54,sw=14,ci=2*Math.PI*R;var cum=0;
  return'<svg width="108" height="108" viewBox="0 0 108 108">'+segs.map(function(s){var p=s.v/tot,d=p*ci,off=-cum*ci;cum+=p;return'<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="'+s.c+'" stroke-width="'+sw+'" stroke-dasharray="'+d+' '+(ci-d)+'" stroke-dashoffset="'+(off+ci*0.25)+'"/>';}).join("")+'<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" fill="#f0e6c8" font-size="16" font-weight="700">'+w+'</text><text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" fill="#8a7a5a" font-size="8">wins</text></svg>';
}

    var d=parseInt(x.date.slice(8));

    dmap[d].push(x);

  var dcells="";
  for(var d=1;d<=days;d++){
    var ts=dmap[d]||[];
    var tot=ts.reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0);},0);
    var has=ts.length>0;
    dcells+='<div class="cday" onclick="selCal('+d+')" style="background:'+(has?(tot>0?"#1a3d2e":tot<0?"#3d1a1a":"#3d3010"):"transparent")+';border-color:'+(G.csel===d?"#f6c90e":has?(tot>0?"#3ecf8e":tot<0?"#fc8181":"#f6c90e"):"#2a2520")+'">'+

      (has?'<div style="color:'+(tot>0?"#3ecf8e":"#fc8181")+';font-size:7px">'+ts.length+'T</div>':'')+
    '</div>';
  }

  // Selected day detail
  var selHtml = "";
  if(G.csel && dmap[G.csel]){
    var selTs = dmap[G.csel];
    var selTot = selTs.reduce(function(s,x){return s+(pnl(x.entry,x.cp,x.sl,x.tp,x.lot,x.dir,x.result)||0);},0);

function upPrev(){
  var rv=rr(+FS.entry,+FS.sl,+FS.tp);
  var pv=FS.result!=="Open"?pnl(+FS.entry,+(FS.cp)||null,+FS.sl,+FS.tp,+FS.lot,FS.dir,FS.result):null;
  var rp=G.bal&&FS.entry&&FS.sl?(Math.abs(+FS.entry-+FS.sl)*(+FS.lot||0)*100/G.bal*100):null;
  var e1=document.getElementById("prv_RR"),e2=document.getElementById("prv_PnL"),e3=document.getElementById("prv_Risk");
  if(e1){e1.textContent=rv?"1:"+f2(rv):"—";e1.style.color=rv>=2?"#3ecf8e":rv>=1?"#f6c90e":"#fc8181";}
  if(e2){e2.textContent=pv!=null?"$"+fm(pv):"—";e2.style.color=pv>0?"#3ecf8e":pv<0?"#fc8181":"#8a7a5a";}
  if(e3){e3.textContent=rp!=null?f2(rp)+"%":"—";e3.style.color=(rp&&rp>G.mrisk)?"#fc8181":"#3ecf8e";}
}
function hdImg(inp,key){
  var file=inp.files[0];if(!file||!file.type.match(/^image\//))return;

function rmTag(tag){FS.tags=(FS.tags||[]).filter(function(t){return t!==tag;});var d=document.getElementById("tagsd");if(d)d.innerHTML=(FS.tags||[]).map(function(tag){return'<span style="background:#3d3010;color:#f6c90e;padding:2px 8px;border-radius:16px;font-size:10px">'+tag+' <span onclick="rmTag(\''+tag+'\')" style="cursor:pointer">✕</span></span>';}).join("");}
function svForm(){
  if(!FS.entry||+FS.entry===0){toast("กรุณากรอก Entry Price","err");return;}
  if(!FS.sl||+FS.sl===0){toast("กรุณากรอก Stop Loss","err");return;}
  if(!FS.tp||+FS.tp===0){toast("กรุณากรอก Take Profit","err");return;}
  var f=Object.assign({},FS,{id:FS.id||uid(),entry:+FS.entry,sl:+FS.sl,tp:+FS.tp,lot:+FS.lot,cp:FS.cp?+FS.cp:null});
  var rp=G.bal&&f.entry&&f.sl?(Math.abs(f.entry-f.sl)*(f.lot||0)*100/G.bal*100):null;
  if(rp&&rp>G.mrisk){document.getElementById("rmsg").textContent="Risk "+f2(rp)+"% เกินขีดจำกัด "+G.mrisk+"%";document.getElementById("rwarn").style.display="block";}
  if(G.etrade){G.t=G.t.map(function(x){return x.id===f.id?f:x;});}else{G.t=[f].concat(G.t);}
  svt();toast(G.etrade?"แก้ไขแล้ว":"บันทึกแล้ว ✅","ok");closeForm();render();
}

  document.body.appendChild(ov);
  document.getElementById("expta").value=data;
  ov.onclick=function(e){if(e.target===ov)ov.remove();};
}
function impJSON(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{var d=JSON.parse(ev.target.result);if(d.trades){G.t=d.trades;svt();}if(d.settings){G.goal=d.settings.goal||500;G.bal=d.settings.bal||10000;G.mrisk=d.settings.mrisk||2;svs();}toast("Import OK","ok");render();}
    catch(err){toast("Error","err");}
  };
  r.readAsText(f);e.target.value="";
}

// ── Controls ───────────────────────────────────────────────────────────────────
function setTab(t){G.tab=t;render();}
function toggleDark(){G.dark=!G.dark;svs();document.body.style.background=G.dark?"#0d0c0a":"#f5f0e8";rHdr();}
function tChip(c){var dg=["BUY","SELL"],rg=["Win","Loss","Open"],ch=G.chips.slice();if(dg.indexOf(c)>=0)ch=ch.filter(function(x){return dg.indexOf(x)<0;});if(rg.indexOf(c)>=0)ch=ch.filter(function(x){return rg.indexOf(x)<0;});G.chips=ch.indexOf(c)>=0?ch.filter(function(x){return x!==c;}):[...ch,c];rJournal();}
function tSort(k){if(G.sk===k)G.sd=G.sd==="asc"?"desc":"asc";else{G.sk=k;G.sd="desc";}rJournal();}
function setJPeriod(p){G.jperiod=p;rJournal();}
function setDPeriod(p){G.dperiod=p;rDash();}
function prevM(){G.cdate=new Date(G.cdate.getFullYear(),G.cdate.getMonth()-1,1);G.csel=null;rCal();}
function nextM(){G.cdate=new Date(G.cdate.getFullYear(),G.cdate.getMonth()+1,1);G.csel=null;rCal();}
function selCal(d){G.csel=G.csel===d?null:d;rCal();}

// ── Render ─────────────────────────────────────────────────────────────────────
function render(){
  rHdr(); rNav();
  document.getElementById("fab").style.display = G.tab==="journal"?"flex":"none";
  if(G.tab==="journal") rJournal();
  else if(G.tab==="dashboard") rDash();
  else rCal();
}

// ── Init ───────────────────────────────────────────────────────────────────────
var fab=document.createElement("button");
fab.id="fab";fab.innerHTML="+";fab.onclick=function(){openForm(null);};fab.style.display="none";
document.getElementById("app").appendChild(fab);

document.addEventListener("visibilitychange",function(){if(document.visibilityState==="hidden"){svt();svs();}});
window.addEventListener("pagehide",function(){svt();svs();});
</script>
</body>
